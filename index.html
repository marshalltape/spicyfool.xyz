<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>spicyfool.xyz</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    image-rendering:pixelated;
    image-rendering:crisp-edges;

    -webkit-font-smoothing:none;
}

body{

    background:#000;

    overflow:hidden;

    height:100vh;

    font-family:'Press Start 2P', monospace;

    color:#ff3131;
}

/* BG */

.bg{

    position:fixed;
    inset:0;

    background:
    linear-gradient(rgba(0,0,0,.95), rgba(0,0,0,.99)),
    url('https://i.imgur.com/5QFZ6yX.jpeg');

    background-size:cover;
    background-position:center;

    filter:
    brightness(.05)
    contrast(1.8)
    saturate(.06);

    transform:scale(1.08);

    image-rendering:pixelated;
}

/* CRT */

.crt{

    position:fixed;
    inset:0;

    background:

    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.045),
        rgba(255,255,255,.045) 1px,
        transparent 1px,
        transparent 4px
    ),

    repeating-linear-gradient(
        to right,
        rgba(255,0,0,.03),
        rgba(255,0,0,.03) 1px,
        transparent 1px,
        transparent 3px
    );

    opacity:.25;

    pointer-events:none;
}

/* VIGNETTE */

.vignette{

    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at center,
        transparent 40%,
        rgba(0,0,0,.88) 100%
    );

    pointer-events:none;
}

/* BLOOD RAIN */

.blood-rain{

    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;

    opacity:.22;

    mix-blend-mode:screen;
}

.drop{

    position:absolute;

    top:-20%;

    width:2px;

    background:linear-gradient(
        to bottom,
        rgba(255,0,0,0),
        rgba(255,0,0,.9)
    );

    filter:blur(.4px);

    animation:bloodFall linear infinite;
}

@keyframes bloodFall{

    from{

        transform:
        translateY(-120vh);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    to{

        transform:
        translateY(120vh);

        opacity:.7;
    }
}

/* SECTIONS */

#enter,
#bio,
#main{

    position:absolute;

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    z-index:10;
}

#bio,
#main{
    display:none;
}

/* DELAY INTRO */

#enter .enter{

    opacity:0;

    animation:
    introReveal 1.4s ease forwards;

    animation-delay:2s;
}

@keyframes introReveal{

    from{

        opacity:0;

        transform:
        translateY(24px)
        scale(.92);

        filter:blur(10px);
    }

    60%{

        opacity:1;

        transform:
        translateY(-2px)
        scale(1.02);

        filter:blur(0);
    }

    to{

        opacity:1;

        transform:
        translateY(0)
        scale(1);

        filter:blur(0);
    }
}

/* ENTER */

.enter{

    display:flex;

    align-items:center;
    justify-content:center;

    gap:20px;

    cursor:pointer;
}

.arrow{

    font-size:20px;

    color:#ff3131;

    opacity:.8;

    animation:pulse 1s infinite;
}

/* PIXEL OVAL */

.logo{

    position:relative;

    font-size:clamp(18px,5vw,44px);

    color:#ff3131;

    text-transform:uppercase;

    padding:28px 46px;

    background:#050505;

    border:4px solid #ff3131;

    clip-path:polygon(
    8% 0%,
    92% 0%,
    100% 20%,
    100% 80%,
    92% 100%,
    8% 100%,
    0% 80%,
    0% 20%
    );

    text-shadow:
    0 0 10px rgba(255,0,0,.18);

    box-shadow:
    0 0 16px rgba(255,0,0,.08);

    overflow:hidden;

    animation:
    logoFloat 4s ease-in-out infinite;
}

/* GLITCH */

.logo::before,
.logo::after{

    content:"SOFICATED";

    position:absolute;

    inset:0;

    display:flex;

    align-items:center;
    justify-content:center;

    background:#050505;

    clip-path:polygon(
    8% 0%,
    92% 0%,
    100% 20%,
    100% 80%,
    92% 100%,
    8% 100%,
    0% 80%,
    0% 20%
    );

    pointer-events:none;
}

.logo::before{

    color:#ff0000;

    transform:translate(-2px,0);

    opacity:.7;

    animation:glitchTop 1.6s infinite linear;
}

.logo::after{

    color:#ff6666;

    transform:translate(2px,0);

    opacity:.5;

    animation:glitchBottom 1.2s infinite linear;
}

/* SECOND */

#typed{

    width:92%;

    max-width:1200px;

    line-height:2.6;

    font-size:14px;

    color:#ff3131;
}

/* THIRD */

.telegram-box{

    margin-top:42px;

    opacity:0;
}

.telegram{

    display:inline-flex;

    align-items:center;
    justify-content:center;

    gap:12px;

    padding:18px 30px;

    border:3px solid #ff3131;

    background:#050505;

    clip-path:polygon(
    8% 0%,
    92% 0%,
    100% 20%,
    100% 80%,
    92% 100%,
    8% 100%,
    0% 80%,
    0% 20%
    );

    color:#ff3131;

    text-decoration:none;

    font-size:10px;

    text-transform:uppercase;
}

.telegram svg{

    width:18px;
    height:18px;

    fill:#ff3131;
}

/* WINDOWS */

.fake-windows{

    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;
}

.window{

    position:absolute;

    width:260px;
    height:170px;

    background:#050505;

    border:2px solid #ff3131;

    overflow:hidden;

    opacity:0;
}

.window::before{

    content:"";

    position:absolute;

    top:0;
    left:0;
    right:0;

    height:18px;

    background:#ff3131;
}

.window::after{

    content:"[] [] []";

    position:absolute;

    top:4px;
    left:8px;

    font-size:8px;

    color:#000;
}

.window img{

    width:100%;
    height:100%;

    object-fit:cover;

    image-rendering:pixelated;

    mix-blend-mode:screen;

    transform:
    scale(1.12);

    filter:

    grayscale(1)

    contrast(2)

    brightness(.5)

    sepia(1)

    hue-rotate(-45deg)

    saturate(16);

    opacity:.35;
}

/* POPUP */

.popup{
    animation:popup .24s cubic-bezier(.16,.84,.44,1) forwards;
}

@keyframes popup{

    from{

        opacity:0;

        transform:
        scale(.76)
        translateY(20px);

        filter:blur(4px);
    }

    60%{

        opacity:1;

        transform:
        scale(1.03)
        translateY(-2px);

        filter:blur(0);
    }

    to{

        opacity:1;

        transform:
        scale(1)
        translateY(0);

        filter:blur(0);
    }
}

/* ANIMS */

.fade{
    animation:fade .8s ease forwards;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(14px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.glitch{
    animation:glitch 1s infinite;
}

@keyframes glitch{

    0%{
        transform:none;
    }

    8%{
        transform:translateX(-1px);
    }

    10%{
        transform:translateX(1px);
    }

    12%{
        clip-path:inset(12% 0 45% 0);
    }

    14%{
        transform:none;
    }

    100%{
        transform:none;
    }
}

@keyframes pulse{

    0%{
        transform:translateX(0);
        opacity:.4;
    }

    50%{
        transform:translateX(7px);
        opacity:1;
    }

    100%{
        transform:translateX(0);
        opacity:.4;
    }
}

@keyframes logoFloat{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-3px);
    }

    100%{
        transform:translateY(0);
    }
}

@keyframes glitchTop{

    0%{
        clip-path:inset(0 0 85% 0);
        transform:translate(-2px,-2px);
    }

    10%{
        clip-path:inset(10% 0 60% 0);
        transform:translate(2px,2px);
    }

    20%{
        clip-path:inset(80% 0 5% 0);
        transform:translate(-1px,1px);
    }

    30%{
        clip-path:inset(40% 0 40% 0);
        transform:translate(1px,-1px);
    }

    100%{
        clip-path:inset(0 0 85% 0);
        transform:translate(-2px,-2px);
    }
}

@keyframes glitchBottom{

    0%{
        clip-path:inset(85% 0 0 0);
        transform:translate(2px,2px);
    }

    10%{
        clip-path:inset(60% 0 10% 0);
        transform:translate(-2px,-1px);
    }

    20%{
        clip-path:inset(5% 0 80% 0);
        transform:translate(1px,2px);
    }

    30%{
        clip-path:inset(40% 0 40% 0);
        transform:translate(-1px,1px);
    }

    100%{
        clip-path:inset(85% 0 0 0);
        transform:translate(2px,2px);
    }
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="crt"></div>
<div class="vignette"></div>

<!-- BLOOD -->

<div class="blood-rain">

<div class="drop" style="left:2%;height:320px;animation-duration:7s;"></div>
<div class="drop" style="left:6%;height:260px;animation-duration:5s;"></div>
<div class="drop" style="left:12%;height:410px;animation-duration:8s;"></div>
<div class="drop" style="left:18%;height:340px;animation-duration:6s;"></div>
<div class="drop" style="left:24%;height:290px;animation-duration:7s;"></div>
<div class="drop" style="left:31%;height:460px;animation-duration:9s;"></div>
<div class="drop" style="left:39%;height:300px;animation-duration:5s;"></div>
<div class="drop" style="left:46%;height:380px;animation-duration:8s;"></div>
<div class="drop" style="left:54%;height:270px;animation-duration:6s;"></div>
<div class="drop" style="left:63%;height:430px;animation-duration:9s;"></div>
<div class="drop" style="left:71%;height:330px;animation-duration:7s;"></div>
<div class="drop" style="left:79%;height:260px;animation-duration:5s;"></div>
<div class="drop" style="left:87%;height:410px;animation-duration:8s;"></div>
<div class="drop" style="left:94%;height:300px;animation-duration:6s;"></div>

</div>

<!-- WINDOWS -->

<div class="fake-windows">

<div class="window" style="top:8%;left:5%;">
<img src="kali.png.png">
</div>

<div class="window" style="top:14%;left:68%;">
<img src="tor.png.png">
</div>

<div class="window" style="top:70%;left:10%;">
<img src="wireshark.png.png">
</div>

<div class="window" style="top:58%;left:64%;">
<img src="terminal.png.png">
</div>

<div class="window" style="top:34%;left:74%;">
<img src="linux.png.png">
</div>

<div class="window" style="top:46%;left:4%;">
<img src="telegram.png.png">
</div>

</div>

<!-- FIRST -->

<div id="enter">

<div class="enter" onclick="startSequence()">

<div class="arrow">>>></div>

<div class="arrow">>></div>

<div class="logo">
SOFICATED
</div>

<div class="arrow"><<</div>

<div class="arrow"><<<</div>

</div>

</div>

<!-- SECOND -->

<div id="bio">

<div id="typed"></div>

</div>

<!-- THIRD -->

<div id="main">

<div class="logo fade">
@SPICEFool
</div>

<div class="telegram-box">

<a
class="telegram glitch"
href="https://t.me/soficateded"
target="_blank">

<svg viewBox="0 0 24 24">
<path d="M9.993 15.674 9.58 21.49c.588 0 .843-.253 1.149-.556l2.757-2.64 5.714 4.182c1.048.583 1.79.276 2.073-.97L24 1.748 23.999 1.747c.333-1.553-.561-2.16-1.582-1.78L1.33 8.07C-.162 8.65-.14 9.48 1.077 9.853l5.77 1.804L20.24 3.34c.63-.417 1.203-.186.73.23"/>
</svg>

TELEGRAM

</a>

</div>

</div>

<!-- INTRO MUSIC -->

<audio id="introMusic" loop>
<source src="memo.mp3.mp3" type="audio/mpeg">
</audio>

<!-- MAIN MUSIC -->

<audio id="music">
<source src="sound.mp3.mp3" type="audio/mpeg">
</audio>

<script>

window.addEventListener("load",()=>{

const intro =
document.getElementById("introMusic");

intro.volume = 0.7;

intro.play().catch(()=>{});

});

const text =
"osint • privacy tools • network research";

function startSequence(){

const enter = document.getElementById("enter");
const bio = document.getElementById("bio");
const main = document.getElementById("main");

const typed = document.getElementById("typed");

const music = document.getElementById("music");

const intro =
document.getElementById("introMusic");

const tg = document.querySelector(".telegram-box");

const windows = document.querySelectorAll(".window");

enter.style.transition=".7s ease";
enter.style.opacity="0";

setTimeout(()=>{

enter.style.display="none";

bio.style.display="flex";

/* stop intro */

intro.pause();
intro.currentTime = 0;

/* start main */

music.play();

let i = 0;

const typing = setInterval(()=>{

typed.innerHTML += text.charAt(i);

i++;

if(i >= text.length){

clearInterval(typing);

setTimeout(()=>{

bio.style.transition="1s ease";
bio.style.opacity="0";

setTimeout(()=>{

bio.style.display="none";

main.style.display="flex";

main.classList.add("fade");

setTimeout(()=>{

tg.style.transition="1s ease";
tg.style.opacity="1";

/* first wave */

windows.forEach((win,index)=>{

setTimeout(()=>{

win.classList.add("popup");

},index * 500);

});

/* second wave */

setTimeout(()=>{

const positions = [

{ top:"6%", left:"32%" },
{ top:"18%", left:"82%" },
{ top:"76%", left:"36%" },
{ top:"64%", left:"82%" },
{ top:"42%", left:"52%" },
{ top:"82%", left:"68%" },

{ top:"12%", left:"48%" },
{ top:"26%", left:"12%" },
{ top:"74%", left:"58%" },
{ top:"52%", left:"28%" },
{ top:"20%", left:"58%" },
{ top:"62%", left:"12%" },

{ top:"8%", left:"56%" },
{ top:"44%", left:"84%" },
{ top:"72%", left:"76%" },
{ top:"28%", left:"40%" }

];

for(let i = 0; i < 18; i++){

setTimeout(()=>{

const source =
windows[i % windows.length];

const clone =
source.cloneNode(true);

clone.classList.remove("popup");

clone.style.opacity = "0";

clone.style.top =
positions[i % positions.length].top;

clone.style.left =
positions[i % positions.length].left;

document.querySelector(".fake-windows")
.appendChild(clone);

requestAnimationFrame(()=>{

clone.classList.add("popup");

});

},i * 650);

}

},3000);

/* remove glitch later */

setTimeout(()=>{

document.querySelectorAll(".glitch").forEach(el=>{

el.classList.remove("glitch");

});

},16000);

},700);

},900);

},1200);

}

},110);

},650);

}

</script>

</body>
