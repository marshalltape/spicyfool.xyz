<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spicyfool.xyz</title>

<style>
body {
    margin: 0;
    background: black;
    color: red;
    font-family: monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.scanlines {
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,0,0,0.03),
        rgba(255,0,0,0.03) 1px,
        transparent 1px,
        transparent 4px
    );
    pointer-events: none;
}

#enter {
    text-align: center;
    cursor: pointer;
}

#main {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: 4rem;
    text-shadow: 0 0 20px red;
    animation: flicker 1.5s infinite alternate;
    margin: 0;
}

.enter-arrow {
    font-size: 3rem;
    color: red;
    margin-bottom: 20px;
    animation: float 1.5s infinite ease-in-out;
    text-shadow: 0 0 15px red;
}

.telegram-arrow {
    font-size: 2rem;
    margin-top: 25px;
    margin-bottom: 10px;
    animation: float 1.5s infinite ease-in-out;
}

.telegram-btn {
    color: red;
    text-decoration: none;
    font-size: 1.3rem;
    border: 2px solid red;
    padding: 12px 28px;
    border-radius: 999px;
    text-shadow: 0 0 10px red;
    box-shadow: 0 0 15px rgba(255,0,0,0.5);
    transition: 0.3s;
}

.telegram-btn:hover {
    background: red;
    color: black;
}

@keyframes flicker {
    from {
        opacity: 1;
    }
    to {
        opacity: 0.7;
    }
}

@keyframes float {
    0% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(8px);
    }
    100% {
        transform: translateY(0px);
    }
}
</style>
</head>

<body>

<div class="scanlines"></div>

<div id="enter" onclick="enterSite()">
    <div class="enter-arrow">↑</div>
    <h1>SOFICATED</h1>
</div>

<div id="main">
    <h1>@spicefool</h1>

    <div class="telegram-arrow">↓</div>

    <a class="telegram-btn" href="https://t.me/soficateded" target="_blank">
        TELEGRAM
    </a>
</div>

<audio id="music" loop>
    <source src="OsamaSon — X & Sex (www.lightaudio.ru).mp3" type="audio/mpeg">
</audio>

<script>
function enterSite() {
    document.getElementById("enter").style.display = "none";
    document.getElementById("main").style.display = "flex";

    document.getElementById("music").play();
}
</script>

</body>
</html>
