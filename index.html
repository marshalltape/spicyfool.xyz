<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spicyfool.xyz</title>

<style>
body{
    margin:0;
    background:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.88)),
        url('https://i.imgur.com/5QFZ6yX.jpeg');
    background-size:cover;
    background-position:center;
    color:red;
    font-family:monospace;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.scanlines{
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,0,0,0.03),
        rgba(255,0,0,0.03) 1px,
        transparent 1px,
        transparent 4px
    );
    pointer-events:none;
}

#enter,
#bio,
#main{
    position:absolute;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#bio,
#main{
    display:none;
}

.enter-wrapper{
    display:flex;
    align-items:center;
    gap:20px;
    cursor:pointer;
}

.enter-arrow{
    font-size:3rem;
    animation:pulseX 1.2s infinite;
    text-shadow:0 0 15px red;
}

h1{
    font-size:4rem;
    text-shadow:0 0 20px red;
    margin:0;
    animation:flicker 1.5s infinite alternate;
}

#typed-text{
    width:80%;
    max-width:900px;
    font-size:1.6rem;
    line-height:2.2rem;
    text-shadow:0 0 10px red;
    white-space:pre-line;
}

.telegram-container{
    margin-top:40px;
    opacity:0;
}

.telegram-btn{
    color:red;
    text-decoration:none;
    font-size:1.3rem;
    border:2px solid red;
    padding:14px 32px;
    border-radius:999px;
    text-shadow:0 0 12px red;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
    background:rgba(0,0,0,0.45);
    display:inline-block;
}

.telegram-logo{
    width:90px;
    margin-top:30px;
    filter:
        brightness(0)
        saturate(100%)
        invert(14%)
        sepia(96%)
        saturate(7161%)
        hue-rotate(356deg)
        brightness(104%)
        contrast(124%);
}

.glitch{
    animation:glitch 0.22s infinite;
}

@keyframes flicker{
    from{opacity:1;}
    to{opacity:0.72;}
}

@keyframes pulseX{
    0%{transform:translateX(0px);}
    50%{transform:translateX(8px);}
    100%{transform:translateX(0px);}
}

@keyframes glitch {

    0%{
        opacity:1;
        filter:
        drop-shadow(0 0 8px red);
        clip-path: inset(0 0 0 0);
    }

    8%{
        clip-path: inset(15% 0 55% 0);
        filter:
        drop-shadow(-6px 0 red)
        drop-shadow(6px 0 darkred);
    }

    12%{
        clip-path: inset(80% 0 5% 0);
    }

    18%{
        clip-path: inset(25% 0 35% 0);
        opacity:0.65;
    }

    24%{
        clip-path: inset(60% 0 12% 0);
    }

    30%{
        clip-path: inset(8% 0 72% 0);
        filter:
        drop-shadow(8px 0 red)
        drop-shadow(-8px 0 darkred);
    }

    36%{
        clip-path: inset(45% 0 22% 0);
    }

    42%{
        clip-path: inset(5% 0 80% 0);
        opacity:0.8;
    }

    48%{
        clip-path: inset(70% 0 10% 0);
    }

    54%{
        clip-path: inset(18% 0 45% 0);
        filter:
        drop-shadow(-5px 0 red)
        drop-shadow(5px 0 darkred);
    }

    60%{
        clip-path: inset(85% 0 3% 0);
    }

    68%{
        clip-path: inset(38% 0 28% 0);
        opacity:0.7;
    }

    76%{
        clip-path: inset(12% 0 65% 0);
    }

    84%{
        clip-path: inset(55% 0 18% 0);
    }

    92%{
        clip-path: inset(20% 0 40% 0);
        filter:
        drop-shadow(10px 0 red)
        drop-shadow(-10px 0 darkred);
    }

    100%{
        opacity:1;
        clip-path: inset(0 0 0 0);
        filter:
        drop-shadow(0 0 18px red);
    }
}
</style>
</head>

<body>

<div class="scanlines"></div>

<div id="enter">
    <div class="enter-wrapper" onclick="startSequence()">
        <div class="enter-arrow">→</div>
        <h1>SOFICATED</h1>
    </div>
</div>

<div id="bio">
    <div id="typed-text"></div>
</div>

<div id="main">

    <h1>@spicefool</h1>

    <div class="telegram-container">

        <a class="telegram-btn glitch"
           href="https://t.me/soficateded"
           target="_blank">
            TELEGRAM
        </a>

        <br>

        <img class="telegram-logo glitch"
        src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">

    </div>

</div>

<audio id="music">
    <source src="sound.mp3.mp3" type="audio/mpeg">
</audio>

<script>

const text =
"𝚜𝚘𝚏𝚒𝚌𝚊𝚝𝚎𝚍\n\n𝚘𝚜𝚒𝚗𝚝 • 𝚙𝚛𝚒𝚟𝚊𝚌𝚢 • 𝚍𝚒𝚐𝚒𝚝𝚊𝚕 𝚊𝚗𝚘𝚗𝚢𝚖𝚒𝚝𝚢";

function startSequence(){

    const enter = document.getElementById("enter");
    const bio = document.getElementById("bio");
    const main = document.getElementById("main");
    const typed = document.getElementById("typed-text");
    const music = document.getElementById("music");
    const tg = document.querySelector(".telegram-container");

    enter.style.transition = "all 0.8s ease";
    enter.style.opacity = "0";

    setTimeout(() => {

        enter.style.display = "none";
        bio.style.display = "flex";

        music.play();

        let i = 0;

        const typing = setInterval(() => {

            typed.innerHTML += text.charAt(i);

            i++;

            if(i >= text.length){

                clearInterval(typing);

                setTimeout(() => {

                    bio.style.transition = "all 1s ease";
                    bio.style.opacity = "0";

                    setTimeout(() => {

                        bio.style.display = "none";

                        main.style.display = "flex";
                        main.style.opacity = "0";
                        main.style.transform = "translateY(60px)";

                        setTimeout(() => {

                            main.style.transition = "all 1.2s ease";
                            main.style.opacity = "1";
                            main.style.transform = "translateY(0px)";

                        },50);

                        setTimeout(() => {

                            tg.style.transition = "opacity 0.3s ease";
                            tg.style.opacity = "1";

                            setTimeout(() => {

                                document.querySelectorAll(".glitch").forEach(el=>{
                                    el.classList.remove("glitch");
                                });

                            },4000);

                        },1000);

                    },1000);

                },2000);

            }

        },40);

    },800);

}

</script>

</body>
</html>
