<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOFICATED</title>

<style>
body{

    background:black;

#main{

a{
    color:red;
    text-decoration:none;
    border:1px solid red;
    padding:12px 24px;
    margin-top:20px;
    transition:0.3s;

a:hover{
    background:red;
    color:black;

.scanlines{
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,0,0,0.03),

        TELEGRAM
    </a>
</div>

<audio id="music" loop>

<script>
function enterSite(){
    document.getElementById("enter").style.display = "none";
    document.getElementById("main").style.display = "flex";

    document.getElementById("music").play();
}
</script>

</body>
</html>
