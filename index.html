<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOFICATED</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

image-rendering:pixelated;
image-rendering:crisp-edges;

-webkit-font-smoothing:none;
}

body{
overflow:hidden;
background:#000;
height:100vh;

font-family:'Press Start 2P', monospace;
color:#ff2d2d;
}

/* =========================
FIRST SCENE
========================= */

.first-scene{
position:fixed;
inset:0;
z-index:1;
transition:1s ease;
}

/* BACKGROUND */

.bg{

position:absolute;
inset:0;

background:

linear-gradient(
rgba(0,0,0,.72),
rgba(0,0,0,.92)
),

url('./D505272C-274C-4DFB-8062-40CEAFD3C776.jpeg');

background-size:cover;
background-position:center;

filter:
brightness(.48)
contrast(1.2)
saturate(.8);

transform:scale(1.08);

animation:bgMove 14s ease-in-out infinite alternate;
}

@keyframes bgMove{

from{
transform:scale(1.08) translateX(0);
}

to{
transform:scale(1.12) translateX(-14px);
}
}

/* RED FOG */

.red-fog{

position:absolute;
inset:0;

background:

radial-gradient(
circle at center,
rgba(255,0,0,.08),
transparent 65%
),

linear-gradient(
to bottom,
rgba(70,0,0,.12),
rgba(0,0,0,.2)
);

mix-blend-mode:screen;

animation:fog 7s ease-in-out infinite;

pointer-events:none;
}

@keyframes fog{

0%{
opacity:.35;
transform:scale(1);
}

50%{
opacity:.7;
transform:scale(1.06);
}

100%{
opacity:.35;
transform:scale(1);
}
}

/* CRT */

.crt{

position:fixed;
inset:0;

background:

repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 4px
),

repeating-linear-gradient(
to right,
rgba(255,0,0,.02),
rgba(255,0,0,.02) 1px,
transparent 1px,
transparent 3px
);

opacity:.22;

pointer-events:none;

z-index:999;
}

/* BLOOD */

.blood-rain{

position:absolute;
inset:0;

overflow:hidden;

pointer-events:none;

mix-blend-mode:screen;
}

.drop{

position:absolute;

top:-50%;

width:4px;

background:

linear-gradient(
to bottom,
rgba(255,0,0,0),
rgba(180,0,0,.9),
rgba(255,50,50,1)
);

box-shadow:

0 0 12px rgba(255,0,0,.35),
0 0 32px rgba(255,0,0,.1);

opacity:.9;

animation:blood linear infinite;
}

@keyframes blood{

from{
transform:translateY(-120vh);
opacity:0;
}

10%{
opacity:1;
}

to{
transform:translateY(140vh);
opacity:.9;
}
}

/* VIGNETTE */

.vignette{

position:fixed;
inset:0;

background:
radial-gradient(
circle at center,
transparent 35%,
rgba(0,0,0,.9) 100%
);

pointer-events:none;

z-index:998;
}

/* =========================
WINDOWS
========================= */

.fake-windows{

position:fixed;
inset:0;

overflow:hidden;

pointer-events:none;

z-index:5;
}

.window{

position:absolute;

width:260px;
height:170px;

background:

linear-gradient(
145deg,
rgba(15,0,0,.82),
rgba(0,0,0,.94)
);

border:2px solid #ff3b3b;

border-radius:24px;

overflow:hidden;

opacity:0;

backdrop-filter:blur(2px);

box-shadow:

0 0 20px rgba(255,0,0,.16),

0 0 90px rgba(255,0,0,.08),

inset 0 0 18px rgba(255,0,0,.04);
}

.window::before{

content:"";

position:absolute;

top:0;
left:0;
right:0;

height:22px;

background:

linear-gradient(
to right,
#ff3b3b,
#8f0000
);

z-index:2;
}

.window::after{

content:"[] [] []";

position:absolute;

top:5px;
left:10px;

font-size:8px;

letter-spacing:2px;

color:#140000;

z-index:3;

opacity:.95;
}

.window img{

width:100%;
height:100%;

object-fit:cover;

image-rendering:pixelated;

transform:scale(1.02);

opacity:.84;

filter:

brightness(.92)
contrast(1.45)
saturate(.7);

mix-blend-mode:normal;
}

/* POPUP */

.popup{
animation:popup .28s cubic-bezier(.16,.84,.44,1) forwards;
}

@keyframes popup{

from{

opacity:0;

transform:
scale(.72)
translateY(26px);

filter:
blur(5px)
brightness(1.4);
}

60%{

opacity:1;

transform:
scale(1.03)
translateY(-2px);

filter:
blur(0)
brightness(1.08);
}

to{

opacity:1;

transform:
scale(1)
translateY(0);

filter:none;
}
}

/* =========================
SCREENS
========================= */

#enter,
#bio,
#main{

position:absolute;
inset:0;

display:flex;

flex-direction:column;

justify-content:center;
align-items:center;

text-align:center;

z-index:20;
}

#bio,
#main{
display:none;
}

/* INTRO */

#enter{

opacity:0;

animation:
showIntro .2s linear forwards;

animation-delay:2s;
}

@keyframes showIntro{

to{
opacity:1;
}
}

.enter{

display:flex;

align-items:center;

gap:18px;

opacity:0;

animation:
reveal 1.2s ease forwards;

animation-delay:2.1s;

cursor:pointer;
}

@keyframes reveal{

from{

opacity:0;

transform:
translateY(20px)
scale(.9);

filter:blur(10px);
}

60%{

opacity:1;

transform:
translateY(-2px)
scale(1.02);

filter:blur(0);
}

to{

opacity:1;

transform:
translateY(0)
scale(1);

filter:blur(0);
}
}

.arrow{

font-size:20px;

color:#ff2d2d;

opacity:.75;

animation:pulse 1s infinite;
}

@keyframes pulse{

0%{
transform:translateX(0);
opacity:.4;
}

50%{
transform:translateX(6px);
opacity:1;
}

100%{
transform:translateX(0);
opacity:.4;
}
}

/* LOGO */

.logo{

position:relative;

padding:28px 58px;

background:#050505;

border:4px solid #ff2d2d;

border-radius:999px;

font-size:clamp(18px,5vw,44px);

text-transform:uppercase;

overflow:hidden;

text-shadow:
0 0 10px rgba(255,0,0,.18);

box-shadow:
0 0 20px rgba(255,0,0,.18),
inset 0 0 20px rgba(255,0,0,.06);

animation:
float 4s ease-in-out infinite,
logoGlitch 5s infinite;

transition:
transform .12s ease,
background .18s ease,
box-shadow .18s ease,
border-color .18s ease,
color .18s ease;
}

.logo:hover{

transform:scale(1.02);

box-shadow:

0 0 18px rgba(255,0,0,.24),
0 0 50px rgba(255,0,0,.12),
inset 0 0 18px rgba(255,0,0,.08);
}

.logo:active{

transform:
scale(.96)
translateY(2px);

background:#220000;

border-color:#ff5c5c;

color:#ff6666;

box-shadow:

0 0 8px rgba(255,0,0,.2),
inset 0 0 22px rgba(255,0,0,.22),
0 0 40px rgba(255,0,0,.12);
}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-3px);
}

100%{
transform:translateY(0);
}
}

@keyframes logoGlitch{

0%{
filter:none;
}

2%{

transform:
translateX(-3px)
skewX(4deg);

filter:
brightness(1.4)
contrast(1.5);
}

4%{

transform:
translateX(4px)
skewX(-5deg);

filter:
brightness(2);
}

5%{
transform:none;
filter:none;
}

100%{
transform:none;
filter:none;
}
}

/* SECOND */

#typed{

width:90%;
max-width:1100px;

line-height:2.5;

font-size:14px;
}

/* TELEGRAM */

.telegram-box{

margin-top:42px;

opacity:0;

transition:1s ease;
}

.telegram{

display:inline-flex;

align-items:center;
justify-content:center;

gap:12px;

padding:18px 34px;

background:#050505;

border:3px solid #ff2d2d;

border-radius:999px;

text-decoration:none;

color:#ff2d2d;

font-size:10px;

transition:

transform .12s ease,
background .18s ease,
box-shadow .18s ease,
border-color .18s ease,
color .18s ease;
}

.telegram:hover{

transform:scale(1.02);

box-shadow:

0 0 18px rgba(255,0,0,.24),
0 0 50px rgba(255,0,0,.12),
inset 0 0 18px rgba(255,0,0,.08);
}

.telegram:active{

transform:
scale(.96)
translateY(2px);

background:#220000;

border-color:#ff5c5c;

color:#ff6666;

box-shadow:

0 0 8px rgba(255,0,0,.2),
inset 0 0 22px rgba(255,0,0,.22),
0 0 40px rgba(255,0,0,.12);
}

.telegram svg{

width:18px;
height:18px;

fill:#ff2d2d;
}

.telegram:active svg{

fill:#ff6666;

transform:scale(.92);
}

.fade{
animation:fade .8s ease forwards;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(14px);
}

to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="first-scene" id="firstScene">

<div class="bg"></div>

<div class="red-fog"></div>

<div class="blood-rain">

<div class="drop" style="left:2%;height:520px;animation-duration:9s;"></div>
<div class="drop" style="left:6%;height:430px;animation-duration:6s;"></div>
<div class="drop" style="left:11%;height:610px;animation-duration:10s;"></div>
<div class="drop" style="left:18%;height:480px;animation-duration:7s;"></div>

</div>

</div>

<div class="crt"></div>
<div class="vignette"></div>

<!-- WINDOWS -->

<div class="fake-windows">

<div class="window" style="top:8%;left:5%;">
<img src="./kali.png.png">
</div>

<div class="window" style="top:14%;left:68%;">
<img src="./tor.png.png">
</div>

<div class="window" style="top:70%;left:10%;">
<img src="./wireshark.png.png">
</div>

<div class="window" style="top:58%;left:64%;">
<img src="./terminal.png.png">
</div>

<div class="window" style="top:34%;left:74%;">
<img src="./linux.png.png">
</div>

<div class="window" style="top:46%;left:4%;">
<img src="./telegram.png.png">
</div>

</div>

<!-- FIRST -->

<div id="enter">

<div class="enter" onclick="startSequence()">

<div class="arrow">>>></div>

<div class="logo">
SOFICATED
</div>

<div class="arrow"><<<</div>

</div>

</div>

<!-- SECOND -->

<div id="bio">
<div id="typed"></div>
</div>

<!-- THIRD -->

<div id="main">

<div class="logo fade">
@SPICEFool
</div>

<div class="telegram-box">

<a
class="telegram"
href="https://t.me/soficateded"
target="_blank">

<svg viewBox="0 0 24 24">
<path d="M9.993 15.674 9.58 21.49c.588 0 .843-.253 1.149-.556l2.757-2.64 5.714 4.182c1.048.583 1.79.276 2.073-.97L24 1.748 23.999 1.747c.333-1.553-.561-2.16-1.582-1.78L1.33 8.07C-.162 8.65-.14 9.48 1.077 9.853l5.77 1.804L20.24 3.34c.63-.417 1.203-.186.73.23"/>
</svg>

TELEGRAM

</a>

</div>

</div>

<audio id="introMusic" loop>
<source src="./memo.mp3.mp3" type="audio/mpeg">
</audio>

<audio id="music">
<source src="./sound.mp3.mp3" type="audio/mpeg">
</audio>

<script>

window.addEventListener("load",()=>{

const intro =
document.getElementById("introMusic");

intro.volume = 0.7;

intro.play().catch(()=>{});

});

const text =
"osint • privacy tools • network research";

function startSequence(){

const firstScene =
document.getElementById("firstScene");

const enter =
document.getElementById("enter");

const bio =
document.getElementById("bio");

const main =
document.getElementById("main");

const typed =
document.getElementById("typed");

const music =
document.getElementById("music");

const intro =
document.getElementById("introMusic");

const tg =
document.querySelector(".telegram-box");

const windows =
document.querySelectorAll(".window");

enter.style.transition=".7s ease";
enter.style.opacity="0";

firstScene.style.opacity="0";

setTimeout(()=>{

firstScene.style.display="none";

enter.style.display="none";

bio.style.display="flex";

intro.pause();
intro.currentTime = 0;

music.play().catch(()=>{});

let i = 0;

const typing = setInterval(()=>{

typed.innerHTML += text.charAt(i);

i++;

if(i >= text.length){

clearInterval(typing);

setTimeout(()=>{

bio.style.transition="1s ease";
bio.style.opacity="0";

setTimeout(()=>{

bio.style.display="none";

main.style.display="flex";

main.classList.add("fade");

setTimeout(()=>{

tg.style.opacity="1";

windows.forEach((win,index)=>{

setTimeout(()=>{

win.classList.add("popup");

},index * 500);

});

},700);

},900);

},1200);

}

},110);

},650);

}

</script>

</body>
</html>
