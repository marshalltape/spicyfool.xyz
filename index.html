<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOFICATED</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

image-rendering:pixelated;
image-rendering:crisp-edges;

-webkit-font-smoothing:none;
}

body{
overflow:hidden;
background:#000;
height:100vh;
font-family:'Press Start 2P', monospace;
color:#ff2d2d;
}

/* FIRST SCENE */

.first-scene{
position:fixed;
inset:0;
z-index:1;
transition:1s ease;
}

/* BACKGROUND */

.bg{
position:absolute;
inset:0;

background:
linear-gradient(
rgba(0,0,0,.78),
rgba(0,0,0,.92)
),
url('D505272C-274C-4DFB-8062-40CEAFD3C776.jpeg');

background-size:cover;
background-position:center;

filter:
brightness(.42)
contrast(1.4)
saturate(.9)
blur(.4px);

transform:scale(1.08);

animation:bgMove 12s ease-in-out infinite alternate;
}

@keyframes bgMove{
from{
transform:scale(1.08) translateX(0);
}
to{
transform:scale(1.12) translateX(-12px);
}
}

/* RED FOG */

.red-fog{
position:absolute;
inset:0;

background:
radial-gradient(
circle at center,
rgba(255,0,0,.12),
transparent 60%
),

linear-gradient(
to bottom,
rgba(80,0,0,.16),
rgba(0,0,0,.25)
);

mix-blend-mode:screen;

animation:fog 6s ease-in-out infinite;
pointer-events:none;
}

@keyframes fog{
0%{
opacity:.45;
transform:scale(1);
}
50%{
opacity:.75;
transform:scale(1.08);
}
100%{
opacity:.45;
transform:scale(1);
}
}

/* CRT */

.crt{
position:fixed;
inset:0;

background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.04),
rgba(255,255,255,.04) 1px,
transparent 1px,
transparent 4px
),

repeating-linear-gradient(
to right,
rgba(255,0,0,.03),
rgba(255,0,0,.03) 1px,
transparent 1px,
transparent 3px
);

opacity:.24;
pointer-events:none;
z-index:999;
}

/* BLOOD */

.blood-rain{
position:absolute;
inset:0;
overflow:hidden;
pointer-events:none;
mix-blend-mode:screen;
}

.drop{
position:absolute;
top:-50%;
width:4px;

background:
linear-gradient(
to bottom,
rgba(255,0,0,0),
rgba(180,0,0,.95),
rgba(255,30,30,1)
);

box-shadow:
0 0 14px rgba(255,0,0,.45),
0 0 40px rgba(255,0,0,.12);

opacity:.95;
filter:blur(.3px);

animation:blood linear infinite;
}

.drop::after{
content:"";

position:absolute;

bottom:-14px;
left:-4px;

width:12px;
height:12px;

background:#8f0000;

border-radius:2px;

filter:blur(.5px);
}

@keyframes blood{

from{
transform:
translateY(-120vh)
scaleY(.8);

opacity:0;
}

10%{
opacity:1;
}

to{
transform:
translateY(140vh)
scaleY(1.2);

opacity:.95;
}
}

/* VIGNETTE */

.vignette{
position:fixed;
inset:0;

background:
radial-gradient(
circle at center,
transparent 35%,
rgba(0,0,0,.9) 100%
);

pointer-events:none;
z-index:998;
}

/* WINDOWS */

.fake-windows{
position:fixed;
inset:0;
overflow:hidden;
pointer-events:none;
z-index:5;
}

.window{
position:absolute;

width:260px;
height:170px;

background:#050505;

border:2px solid #ff2d2d;

border-radius:20px;

overflow:hidden;

opacity:0;

box-shadow:
0 0 14px rgba(255,0,0,.12),
0 0 60px rgba(255,0,0,.06);
}

.window::before{
content:"";

position:absolute;

top:0;
left:0;
right:0;

height:18px;

background:#ff2d2d;
}

.window::after{
content:"[] [] []";

position:absolute;

top:4px;
left:8px;

font-size:8px;

color:#000;
}

.window img{
width:100%;
height:100%;

object-fit:cover;

image-rendering:pixelated;

mix-blend-mode:screen;

transform:scale(1.12);

opacity:.42;

filter:
grayscale(1)
contrast(2.4)
brightness(.52)
sepia(1)
hue-rotate(-55deg)
saturate(18)
blur(.2px);
}

/* POPUP */

.popup{
animation:popup .25s cubic-bezier(.16,.84,.44,1) forwards;
}

@keyframes popup{

from{
opacity:0;

transform:
scale(.75)
translateY(20px);

filter:blur(4px);
}

60%{
opacity:1;

transform:
scale(1.03)
translateY(-2px);

filter:blur(0);
}

to{
opacity:1;

transform:
scale(1)
translateY(0);

filter:blur(0);
}
}

/* SCREENS */

#enter,
#bio,
#main{

position:absolute;
inset:0;

display:flex;

flex-direction:column;

justify-content:center;
align-items:center;

text-align:center;

z-index:20;
}

#bio,
#main{
display:none;
}

/* INTRO */

#enter{
opacity:0;

animation:
showIntro .2s linear forwards;

animation-delay:2s;
}

@keyframes showIntro{
to{
opacity:1;
}
}

.enter{
display:flex;
align-items:center;
gap:18px;

opacity:0;

animation:
reveal 1.2s ease forwards;

animation-delay:2.1s;

cursor:pointer;
}

@keyframes reveal{

from{
opacity:0;

transform:
translateY(20px)
scale(.9);

filter:blur(10px);
}

60%{
opacity:1;

transform:
translateY(-2px)
scale(1.02);

filter:blur(0);
}

to{
opacity:1;

transform:
translateY(0)
scale(1);

filter:blur(0);
}
}

.arrow{
font-size:20px;
color:#ff2d2d;

opacity:.75;

animation:pulse 1s infinite;
}

@keyframes pulse{
0%{
transform:translateX(0);
opacity:.4;
}
50%{
transform:translateX(6px);
opacity:1;
}
100%{
transform:translateX(0);
opacity:.4;
}
}

/* LOGO */

.logo{
position:relative;

padding:28px 58px;

background:#050505;

border:4px solid #ff2d2d;

border-radius:999px;

font-size:clamp(18px,5vw,44px);

text-transform:uppercase;

overflow:hidden;

text-shadow:
0 0 10px rgba(255,0,0,.18);

box-shadow:
0 0 20px rgba(255,0,0,.18),
inset 0 0 20px rgba(255,0,0,.06);

animation:
float 4s ease-in-out infinite,
logoGlitch 5s infinite;
}

@keyframes float{
0%{
transform:translateY(0);
}
50%{
transform:translateY(-3px);
}
100%{
transform:translateY(0);
}
}

@keyframes logoGlitch{
0%{
filter:none;
}

2%{
transform:
translateX(-3px)
skewX(4deg);

filter:
brightness(1.4)
contrast(1.5);
}

4%{
transform:
translateX(4px)
skewX(-5deg);

filter:
brightness(2);
}

5%{
transform:none;
filter:none;
}

100%{
transform:none;
filter:none;
}
}

/* GLITCH */

.logo::before,
.logo::after{

content:"SOFICATED";

position:absolute;
inset:0;

display:flex;

align-items:center;
justify-content:center;

background:#050505;

border-radius:999px;
}

.logo::before{

color:#ff0000;

opacity:.7;

mix-blend-mode:screen;

animation:
glitchTop 2s infinite linear;
}

.logo::after{

color:#ff6666;

opacity:.35;

mix-blend-mode:screen;

animation:
glitchBottom 1.3s infinite linear;
}

@keyframes glitchTop{

0%{
clip-path:inset(0 0 85% 0);
transform:translate(-2px,-2px);
}

20%{
clip-path:inset(80% 0 5% 0);
transform:translate(2px,2px);
}

40%{
clip-path:inset(30% 0 40% 0);
transform:translate(-1px,1px);
}

100%{
clip-path:inset(0 0 85% 0);
transform:translate(-2px,-2px);
}
}

@keyframes glitchBottom{

0%{
clip-path:inset(85% 0 0 0);
transform:translate(2px,2px);
}

20%{
clip-path:inset(60% 0 10% 0);
transform:translate(-2px,-1px);
}

40%{
clip-path:inset(40% 0 40% 0);
transform:translate(1px,2px);
}

100%{
clip-path:inset(85% 0 0 0);
transform:translate(2px,2px);
}
}

</style>
</head>
<body>

<div class="first-scene" id="firstScene">

<div class="bg"></div>

<div class="red-fog"></div>

<div class="blood-rain">

<div class="drop" style="left:2%;height:520px;animation-duration:9s;"></div>
<div class="drop" style="left:6%;height:430px;animation-duration:6s;"></div>
<div class="drop" style="left:11%;height:610px;animation-duration:10s;"></div>
<div class="drop" style="left:18%;height:480px;animation-duration:7s;"></div>

</div>

</div>

<div class="crt"></div>
<div class="vignette"></div>

<div class="fake-windows">

<div class="window" style="top:8%;left:5%;">
<img src="kali.png.png">
</div>

<div class="window" style="top:14%;left:68%;">
<img src="tor.png.png">
</div>

<div class="window" style="top:70%;left:10%;">
<img src="wireshark.png.png">
</div>

</div>

<div id="enter">

<div class="enter">

<div class="arrow">>>></div>

<div class="logo">
SOFICATED
</div>

<div class="arrow"><<<</div>

</div>

</div>

</body>
</html>
