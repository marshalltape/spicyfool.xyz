<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spicyfool.xyz</title>

<style>
body {
    margin: 0;
    background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url('https://i.imgur.com/5QFZ6yX.jpeg');
    background-size: cover;
    background-position: center;
    color: red;
    font-family: monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.scanlines {
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,0,0,0.03),
        rgba(255,0,0,0.03) 1px,
        transparent 1px,
        transparent 4px
    );
    pointer-events: none;
}

#enter {
    text-align: center;
    cursor: pointer;
}

#main {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    opacity: 0;
}

.enter-wrapper {
    display: flex;
    align-items: center;
    gap: 20px;
}

.enter-arrow {
    font-size: 3rem;
    color: red;
    animation: pulse 1.2s infinite;
    text-shadow: 0 0 15px red;
}

h1 {
    font-size: 4rem;
    text-shadow: 0 0 20px red;
    animation: flicker 1.5s infinite alternate;
    margin: 0;
}

.telegram-arrow {
    font-size: 2rem;
    margin-top: 25px;
    margin-bottom: 10px;
    animation: pulseY 1.2s infinite;
    text-shadow: 0 0 10px red;
}

.telegram-btn {
    color: red;
    text-decoration: none;
    font-size: 1.3rem;
    border: 2px solid red;
    padding: 12px 28px;
    border-radius: 999px;
    text-shadow: 0 0 10px red;
    box-shadow: 0 0 15px rgba(255,0,0,0.5);
    background: rgba(0,0,0,0.5);
    transition: 0.3s;
}

.telegram-btn:hover {
    background: red;
    color: black;
}

@keyframes flicker {
    from {
        opacity: 1;
    }
    to {
        opacity: 0.75;
    }
}

@keyframes pulse {
    0% {
        transform: translateX(0px);
        opacity: 1;
    }
    50% {
        transform: translateX(8px);
        opacity: 0.6;
    }
    100% {
        transform: translateX(0px);
        opacity: 1;
    }
}

@keyframes pulseY {
    0% {
        transform: translateY(0px);
        opacity: 1;
    }
    50% {
        transform: translateY(8px);
        opacity: 0.6;
    }
    100% {
        transform: translateY(0px);
        opacity: 1;
    }
}
</style>
</head>

<body>

<div class="scanlines"></div>

<div id="enter" onclick="enterSite()">

    <div class="enter-wrapper">
        <div class="enter-arrow">→</div>
        <h1>SOFICATED</h1>
    </div>

</div>

<div id="main">

    <h1>@spicefool</h1>

    <div class="telegram-arrow">↓</div>

    <a class="telegram-btn" href="https://t.me/soficateded" target="_blank">
        TELEGRAM
    </a>

</div>

<audio id="music" loop>
    <source src="OsamaSon — X & Sex (www.lightaudio.ru).mp3" type="audio/mpeg">
</audio>

<script>
function enterSite() {

    const enter = document.getElementById("enter");
    const main = document.getElementById("main");
    const music = document.getElementById("music");

    enter.style.transition = "all 0.8s ease";
    enter.style.opacity = "0";
    enter.style.transform = "scale(1.08)";

    setTimeout(() => {

        enter.style.display = "none";

        setTimeout(() => {

            main.style.display = "flex";
            main.style.opacity = "0";
            main.style.transform = "translateY(60px)";

            setTimeout(() => {

                main.style.transition = "all 1.2s ease";
                main.style.opacity = "1";
                main.style.transform = "translateY(0px)";

            }, 50);

            music.play();

        }, 1000);

    }, 800);
}
</script>

</body>
</html>
