<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soficated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <style>

    /* ═══════════════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════════════ */

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ═══════════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════════ */

    :root {
      /* ── colour ── */
      --col-black:       #040102;
      --col-black-2:     #070305;
      --col-black-3:     #0c0508;
      --col-red:         #c4111f;
      --col-red-hi:      #e31929;
      --col-red-deep:    #7a0710;
      --col-red-mid:     #a30e1a;
      --col-red-glow:    rgba(196, 17, 31, 0.28);
      --col-text:        #fff5f5;
      --col-text-dim:    rgba(255, 245, 245, 0.30);
      --col-text-faint:  rgba(255, 245, 245, 0.12);
      --col-tg:          #229ed9;
      --col-tg-hi:       #4ec3f7;
      --col-tg-deep:     #1168a8;
      --col-white-5:     rgba(255, 255, 255, 0.05);
      --col-white-10:    rgba(255, 255, 255, 0.10);
      --col-white-16:    rgba(255, 255, 255, 0.16);

      /* ── easing ── */
      --ease-out:        cubic-bezier(0.16, 1, 0.3, 1);
      --ease-apple:      cubic-bezier(0.76, 0, 0.24, 1);
      --ease-spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-in-out:     cubic-bezier(0.45, 0, 0.55, 1);

      /* ── duration ── */
      --dur-fast:   200ms;
      --dur-base:   380ms;
      --dur-slow:   700ms;
      --dur-slower: 950ms;
      --dur-scene:  1100ms;

      /* ── radius ── */
      --radius-pill: 9999px;
      --radius-card: 2.4rem;

      /* ── fonts ── */
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Inter', sans-serif;

      /* ── spacing ── */
      --space-xs: 0.5rem;
      --space-sm: 1rem;
      --space-md: 1.8rem;
      --space-lg: 3rem;
      --space-xl: 5rem;

      /* ── z-index layers ── */
      --z-bg:      0;
      --z-canvas:  1;
      --z-atm:     2;
      --z-content: 10;
      --z-s2:      20;
      --z-cursor:  30;
    }

    /* ═══════════════════════════════════════════════════════════
       HTML & BODY
    ═══════════════════════════════════════════════════════════ */

    html {
      color-scheme: dark;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
      font-family: var(--font-body);
      background: var(--col-black);
      cursor: none; /* custom cursor */
    }

    button {
      font: inherit;
      border: none;
      background: none;
      cursor: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ═══════════════════════════════════════════════════════════
       CUSTOM CURSOR
    ═══════════════════════════════════════════════════════════ */

    .cursor-dot,
    .cursor-ring {
      position: fixed;
      pointer-events: none;
      z-index: var(--z-cursor);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    .cursor-dot {
      width: 6px;
      height: 6px;
      background: var(--col-red);
      box-shadow: 0 0 12px rgba(196, 17, 31, 0.9);
      transition: transform 80ms ease, width 200ms var(--ease-spring), height 200ms var(--ease-spring), background 200ms;
    }

    .cursor-dot.hovering {
      width: 10px;
      height: 10px;
      background: #ff4455;
      box-shadow: 0 0 20px rgba(255, 68, 85, 1);
    }

    .cursor-ring {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(196, 17, 31, 0.5);
      box-shadow: 0 0 16px rgba(196, 17, 31, 0.12);
      transition:
        width 300ms var(--ease-spring),
        height 300ms var(--ease-spring),
        border-color 300ms,
        opacity 300ms;
    }

    .cursor-ring.hovering {
      width: 56px;
      height: 56px;
      border-color: rgba(196, 17, 31, 0.7);
      box-shadow: 0 0 24px rgba(196, 17, 31, 0.2);
    }

    /* ═══════════════════════════════════════════════════════════
       CANVASES
    ═══════════════════════════════════════════════════════════ */

    #rainCanvas,
    #particleCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #rainCanvas {
      z-index: var(--z-canvas);
      transition: opacity 1.8s var(--ease-apple);
    }

    #rainCanvas.fade-out {
      opacity: 0;
    }

    #particleCanvas {
      z-index: calc(var(--z-canvas) + 1);
      transition: opacity 1.4s var(--ease-apple);
    }

    #particleCanvas.fade-out {
      opacity: 0;
    }

    /* ═══════════════════════════════════════════════════════════
       ATMOSPHERE LAYERS
    ═══════════════════════════════════════════════════════════ */

    .atm {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    /* grid lines */
    .atm-grid {
      z-index: var(--z-atm);
      background:
        linear-gradient(rgba(196,17,31,0.042) 1px, transparent 1px),
        linear-gradient(90deg, rgba(196,17,31,0.042) 1px, transparent 1px);
      background-size: 74px 74px;
      mask-image: radial-gradient(ellipse 84% 84% at 50% 50%, rgba(0,0,0,0.88), transparent 94%);
    }

    /* red ambient halo */
    .atm-halo {
      z-index: calc(var(--z-atm) + 1);
      background:
        radial-gradient(ellipse 110% 58% at 50% -4%,
          rgba(196,17,31,0.26) 0%,
          rgba(120,8,16,0.11)  42%,
          transparent          68%),
        radial-gradient(ellipse 52% 38% at 16% 58%,
          rgba(156,10,20,0.13) 0%,
          transparent          62%),
        radial-gradient(ellipse 52% 38% at 84% 50%,
          rgba(136,8,18,0.10)  0%,
          transparent          62%);
      animation: haloBreath 12s ease-in-out infinite;
    }

    /* deep vignette */
    .atm-vignette {
      z-index: calc(var(--z-atm) + 2);
      background: radial-gradient(
        ellipse 140% 140% at 50% 50%,
        transparent          26%,
        rgba(0, 0, 0, 0.52)  64%,
        rgba(0, 0, 0, 0.90)  100%
      );
    }

    /* film grain */
    .atm-grain {
      z-index: calc(var(--z-atm) + 3);
      opacity: 0.036;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
      background-size: 512px 512px;
      mix-blend-mode: overlay;
    }

    /* CRT scanlines */
    .atm-scan {
      z-index: calc(var(--z-atm) + 3);
      background: repeating-linear-gradient(
        180deg,
        transparent             0px,
        transparent             2px,
        rgba(0, 0, 0, 0.064)    2px,
        rgba(0, 0, 0, 0.064)    3px
      );
      opacity: 0.52;
    }

    /* horizontal sweep light */
    .atm-sweep {
      z-index: calc(var(--z-atm) + 1);
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.018) 0%,
        transparent              14%,
        transparent              86%,
        rgba(255,255,255,0.014) 100%
      );
    }

    /* ═══════════════════════════════════════════════════════════
       SCENE 1 — INTRO
    ═══════════════════════════════════════════════════════════ */

    .s1 {
      position: relative;
      z-index: var(--z-content);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.4rem, 4vw, 3rem);
      gap: 0;
      will-change: opacity, transform, filter;
    }

    .s1.out {
      animation: sceneOut var(--dur-scene) var(--ease-apple) forwards;
      pointer-events: none;
    }

    /* ── top corner marks ── */
    .corner-mark {
      position: absolute;
      width: 28px;
      height: 28px;
      opacity: 0.22;
    }

    .corner-mark--tl { top: 2.4rem; left: 2.4rem; border-top: 1px solid var(--col-red); border-left: 1px solid var(--col-red); }
    .corner-mark--tr { top: 2.4rem; right: 2.4rem; border-top: 1px solid var(--col-red); border-right: 1px solid var(--col-red); }
    .corner-mark--bl { bottom: 2.4rem; left: 2.4rem; border-bottom: 1px solid var(--col-red); border-left: 1px solid var(--col-red); }
    .corner-mark--br { bottom: 2.4rem; right: 2.4rem; border-bottom: 1px solid var(--col-red); border-right: 1px solid var(--col-red); }

    .corner-mark {
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }

    /* ── eyebrow ── */
    .eyebrow {
      font-family: var(--font-body);
      font-size: clamp(0.55rem, 0.9vw, 0.68rem);
      font-weight: 400;
      letter-spacing: 0.50em;
      text-transform: uppercase;
      color: var(--col-text-dim);
      margin-bottom: 2.4rem;
      opacity: 0;
      transform: translateY(16px);
      animation: riseIn 1.2s var(--ease-out) 0.22s forwards;
    }

    /* ── main title ── */
    .main-title-wrap {
      position: relative;
      overflow: visible;
    }

    .main-title {
      font-family: var(--font-display);
      font-size: clamp(5.2rem, 17.5vw, 15.5rem);
      line-height: 0.86;
      letter-spacing: 0.06em;
      color: var(--col-text);
      text-align: center;
      user-select: none;
      position: relative;
      will-change: transform;

      text-shadow:
        0   0   40px rgba(200,12,22,0.14),
        0   0  100px rgba(200,12,22,0.07),
        0  22px  60px rgba(0,0,0,0.74),
        0  44px 100px rgba(0,0,0,0.46);

      opacity: 0;
      transform: translateY(34px) scale(0.972);
      animation: titleReveal 1.4s var(--ease-out) 0.06s forwards;
    }

    /* glow duplicate */
    .main-title-glow {
      position: absolute;
      inset: 0;
      font-family: var(--font-display);
      font-size: inherit;
      line-height: inherit;
      letter-spacing: inherit;
      color: transparent;
      text-align: center;
      pointer-events: none;
      user-select: none;
      background: linear-gradient(180deg, var(--col-red-hi), var(--col-red-deep));
      -webkit-background-clip: text;
      background-clip: text;
      opacity: 0;
      filter: blur(24px);
      animation: glowPulse 5s ease-in-out 1.5s infinite alternate;
    }

    /* ── separator ── */
    .sep {
      position: relative;
      width: clamp(80px, 16vw, 220px);
      height: 1px;
      margin: 3.2rem 0 3.2rem;
      opacity: 0;
      animation: fadeIn 1s ease 0.85s forwards;
    }

    .sep::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(196,17,31,0.72) 50%,
        transparent 100%);
    }

    .sep-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--col-red);
      box-shadow:
        0 0 14px rgba(196,17,31,0.9),
        0 0 28px rgba(196,17,31,0.5),
        0 0 48px rgba(196,17,31,0.3);
      animation: dotPulse 2.2s ease-in-out infinite;
    }

    /* ── side lines ── */
    .side-line {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: clamp(60px, 12vh, 120px);
      background: linear-gradient(180deg, transparent, rgba(196,17,31,0.36), transparent);
      opacity: 0;
      animation: fadeIn 1.4s ease 1.0s forwards;
    }

    .side-line--l { left:  clamp(2rem, 4vw, 4rem); }
    .side-line--r { right: clamp(2rem, 4vw, 4rem); }

    /* ── CTA zone ── */
    .cta {
      min-height: 108px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.4rem;
    }

    /* ── hint text below button ── */
    .hint {
      font-size: clamp(0.52rem, 0.78vw, 0.62rem);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--col-text-faint);
      opacity: 0;
      transition: opacity 600ms ease;
    }

    .hint.visible {
      opacity: 1;
    }

    /* ═══════════════════════════════════════════════════════════
       OVAL BUTTON — SOFICATED
    ═══════════════════════════════════════════════════════════ */

    .btn-soficated {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: clamp(270px, 38vw, 430px);
      height: 78px;
      padding: 0 3.8rem;
      border-radius: var(--radius-pill);
      overflow: hidden;
      isolation: isolate;

      font-family: var(--font-display);
      font-size: clamp(1.15rem, 1.75vw, 1.44rem);
      letter-spacing: 0.30em;
      color: rgba(255, 248, 248, 0.97);

      border: 1px solid rgba(255, 90, 100, 0.28);

      background:
        linear-gradient(172deg,
          rgba(186, 14, 24, 0.97) 0%,
          rgba(112,  6, 14, 0.98) 44%,
          rgba( 46,  2,  6, 1.00) 100%);

      box-shadow:
        0  0   0  1px rgba(196,17,31,0.12),
        0  2px  4px rgba(0,0,0,0.32),
        0  8px 22px rgba(100,4,10,0.32),
        0 22px 52px rgba(80,3,8,0.46),
        0 44px 88px rgba(60,2,6,0.28),
        inset 0  1px 0 rgba(255,255,255,0.15),
        inset 0 -1px 0 rgba(0,0,0,0.22);

      opacity: 0;
      transform: translateY(22px) scale(0.966);
      visibility: hidden;

      transition:
        transform     400ms var(--ease-spring),
        box-shadow    400ms var(--ease-out),
        border-color  400ms;
    }

    /* shimmer */
    .btn-soficated .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        108deg,
        transparent             16%,
        rgba(255,255,255,0.20)  48%,
        rgba(255,255,255,0.08)  54%,
        transparent             82%
      );
      transform: translateX(-170%);
      transition: transform 820ms cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }

    /* top glass reflection */
    .btn-soficated .glass {
      position: absolute;
      top: 0; left: 8%; right: 8%;
      height: 44%;
      border-radius: var(--radius-pill) var(--radius-pill) 0 0;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.11) 0%,
        rgba(255,255,255,0.03) 60%,
        transparent             100%);
      pointer-events: none;
    }

    /* inner ring */
    .btn-soficated .inner-ring {
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,0.07);
      pointer-events: none;
    }

    /* label */
    .btn-soficated .label {
      position: relative;
      z-index: 1;
    }

    /* show state */
    .btn-soficated.show {
      visibility: visible;
      animation: btnReveal 1.15s var(--ease-out) forwards;
    }

    /* hover */
    .btn-soficated:hover {
      transform: translateY(-5px) scale(1.024);
      border-color: rgba(255, 136, 148, 0.46);
      box-shadow:
        0  0   0  1px rgba(196,17,31,0.18),
        0  2px  4px rgba(0,0,0,0.44),
        0 10px 26px rgba(120,6,14,0.42),
        0 26px 60px rgba(100,4,10,0.54),
        0 52px 100px rgba(80,3,8,0.30),
        inset 0  1px 0 rgba(255,255,255,0.22),
        0  0  80px rgba(196,17,31,0.22);
    }

    .btn-soficated:hover .shimmer {
      transform: translateX(170%);
    }

    .btn-soficated:active {
      transform: translateY(-2px) scale(1.010);
      transition-duration: 120ms;
    }

    .btn-soficated:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 3px rgba(196,17,31,0.6),
        0 0 0 6px rgba(196,17,31,0.18),
        0 22px 52px rgba(80,3,8,0.46);
    }

    /* ═══════════════════════════════════════════════════════════
       SCENE 2 — TELEGRAM
    ═══════════════════════════════════════════════════════════ */

    .s2 {
      position: fixed;
      inset: 0;
      z-index: var(--z-s2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1.8rem, 3.6vw, 3.4rem);
      padding: clamp(1.4rem, 4vw, 3rem);

      background:
        radial-gradient(ellipse 120% 68% at 50% -6%,
          rgba(34,158,217,0.22) 0%,
          rgba(20,100,152,0.09) 40%,
          transparent           66%),
        radial-gradient(ellipse 70% 50% at 14% 60%,
          rgba(20,100,150,0.08) 0%,
          transparent           58%),
        radial-gradient(ellipse 70% 50% at 86% 54%,
          rgba(18,90,140,0.07)  0%,
          transparent           58%),
        radial-gradient(ellipse at center,
          transparent           30%,
          rgba(0,0,0,0.90)      100%),
        linear-gradient(180deg, #04090f 0%, #020508 100%);

      opacity: 0;
      visibility: hidden;
      transform: scale(0.965) translateY(26px);
      filter: blur(5px);
      transition:
        opacity    var(--dur-scene) var(--ease-out),
        transform  var(--dur-scene) var(--ease-out),
        filter     var(--dur-scene) var(--ease-out),
        visibility 0s linear var(--dur-scene);
    }

    .s2.show {
      opacity: 1;
      visibility: visible;
      transform: scale(1) translateY(0);
      filter: blur(0);
      transition:
        opacity    var(--dur-scene) var(--ease-out),
        transform  var(--dur-scene) var(--ease-out),
        filter     var(--dur-scene) var(--ease-out),
        visibility 0s linear 0s;
    }

    /* ── tg corner marks ── */
    .tg-corner {
      position: absolute;
      width: 26px;
      height: 26px;
      opacity: 0;
    }

    .tg-corner--tl { top: 2.2rem; left: 2.2rem; border-top: 1px solid rgba(34,158,217,0.3); border-left: 1px solid rgba(34,158,217,0.3); }
    .tg-corner--tr { top: 2.2rem; right: 2.2rem; border-top: 1px solid rgba(34,158,217,0.3); border-right: 1px solid rgba(34,158,217,0.3); }
    .tg-corner--bl { bottom: 2.2rem; left: 2.2rem; border-bottom: 1px solid rgba(34,158,217,0.3); border-left: 1px solid rgba(34,158,217,0.3); }
    .tg-corner--br { bottom: 2.2rem; right: 2.2rem; border-bottom: 1px solid rgba(34,158,217,0.3); border-right: 1px solid rgba(34,158,217,0.3); }

    .s2.show .tg-corner {
      animation: fadeIn 0.9s ease 0.8s forwards;
    }

    /* ── orb wrapper ── */
    .tg-orb-wrap {
      position: relative;
      opacity: 0;
      transform: translateY(38px) scale(0.86);
    }

    .s2.show .tg-orb-wrap {
      animation: orbReveal 1.3s var(--ease-out) 0.12s forwards;
    }

    /* ── orb ── */
    .tg-orb {
      position: relative;
      width: clamp(140px, 20vw, 210px);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      isolation: isolate;

      background:
        radial-gradient(circle at 28% 20%,
          rgba(255,255,255,0.34) 0%,
          rgba(255,255,255,0.10) 28%,
          transparent            44%),
        linear-gradient(158deg,
          #5dd0fb 0%,
          #229ed9 44%,
          #1168a8 78%,
          #0d4f82 100%);

      box-shadow:
        0  0   0  1px rgba(34,158,217,0.24),
        0  4px 12px rgba(34,158,217,0.18),
        0 18px 44px rgba(34,158,217,0.28),
        0 38px 88px rgba(34,158,217,0.20),
        inset 0  2px 10px rgba(255,255,255,0.30),
        inset 0 -18px 30px rgba(5,56,92,0.34);
    }

    /* orb inner sheen */
    .tg-orb::before {
      content: "";
      position: absolute;
      top: 6%;
      left: 14%;
      width: 36%;
      height: 28%;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      filter: blur(6px);
      pointer-events: none;
    }

    /* ── pulse rings ── */
    .tg-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(34,158,217,0.22);
      animation: ringPulse 3.8s ease-in-out infinite;
      pointer-events: none;
    }

    .tg-ring:nth-child(1) {
      inset: -18px;
      box-shadow: 0 0 52px rgba(34,158,217,0.14);
      animation-delay: 0s;
    }

    .tg-ring:nth-child(2) {
      inset: -40px;
      border-color: rgba(34,158,217,0.10);
      animation-delay: 0.7s;
    }

    .tg-ring:nth-child(3) {
      inset: -66px;
      border-color: rgba(34,158,217,0.055);
      animation-delay: 1.4s;
    }

    .tg-ring:nth-child(4) {
      inset: -96px;
      border-color: rgba(34,158,217,0.028);
      animation-delay: 2.1s;
    }

    /* ── plane SVG ── */
    .tg-plane {
      position: relative;
      z-index: 1;
      width: 53%;
      transform: translateX(4px) rotate(-10deg);
      filter:
        drop-shadow(0 8px 18px rgba(0,0,0,0.30))
        drop-shadow(0 2px 6px rgba(0,0,0,0.20));
    }

    /* ── tg eyebrow ── */
    .tg-eyebrow {
      font-family: var(--font-body);
      font-size: clamp(0.52rem, 0.82vw, 0.65rem);
      font-weight: 400;
      letter-spacing: 0.50em;
      text-transform: uppercase;
      color: rgba(78,195,247,0.44);
      opacity: 0;
      transform: translateY(14px);
    }

    .s2.show .tg-eyebrow {
      animation: riseIn 1s var(--ease-out) 0.24s forwards;
    }

    /* ── tg title ── */
    .tg-title {
      font-family: var(--font-display);
      font-size: clamp(3.2rem, 9vw, 8rem);
      line-height: 0.87;
      letter-spacing: 0.07em;
      color: #f0f8ff;
      text-align: center;
      text-shadow:
        0  0  80px rgba(34,158,217,0.18),
        0 18px 54px rgba(0,0,0,0.60);
      opacity: 0;
      transform: translateY(24px);
    }

    .s2.show .tg-title {
      animation: riseIn 1.1s var(--ease-out) 0.32s forwards;
    }

    /* ── tg divider ── */
    .tg-sep {
      position: relative;
      width: clamp(70px, 12vw, 160px);
      height: 1px;
      opacity: 0;
    }

    .tg-sep::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent, rgba(34,158,217,0.55), transparent);
    }

    .tg-sep-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--col-tg);
      box-shadow:
        0 0 12px rgba(34,158,217,0.9),
        0 0 24px rgba(34,158,217,0.5);
      animation: dotPulse 2.5s ease-in-out infinite;
    }

    .s2.show .tg-sep {
      animation: fadeIn 1s ease 0.48s forwards;
    }

    /* ── HERE button ── */
    .btn-here {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: clamp(210px, 28vw, 310px);
      height: 74px;
      padding: 0 3.6rem;
      border-radius: var(--radius-pill);
      overflow: hidden;
      isolation: isolate;

      font-family: var(--font-display);
      font-size: clamp(1.30rem, 2.1vw, 1.65rem);
      letter-spacing: 0.30em;
      color: #ffffff;

      border: 1px solid rgba(255,255,255,0.16);

      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.10) 0%,
          rgba(255,255,255,0.04) 50%,
          rgba(255,255,255,0.02) 100%);

      box-shadow:
        0  0   0  1px rgba(34,158,217,0.09),
        0  2px  6px rgba(0,0,0,0.28),
        0 10px 28px rgba(0,0,0,0.36),
        0 28px 60px rgba(0,0,0,0.32),
        inset 0 1px 0 rgba(255,255,255,0.11);

      opacity: 0;
      transform: translateY(20px);
      transition:
        transform    360ms var(--ease-spring),
        border-color 360ms,
        background   360ms,
        box-shadow   360ms;
    }

    /* HERE shimmer */
    .btn-here .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        108deg,
        transparent             18%,
        rgba(255,255,255,0.16)  48%,
        rgba(255,255,255,0.06)  54%,
        transparent             82%
      );
      transform: translateX(-160%);
      transition: transform 780ms cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }

    .btn-here .glass {
      position: absolute;
      top: 0; left: 8%; right: 8%;
      height: 44%;
      border-radius: var(--radius-pill) var(--radius-pill) 0 0;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.09) 0%,
        transparent             100%);
      pointer-events: none;
    }

    .btn-here .inner-ring {
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .btn-here .label {
      position: relative;
      z-index: 1;
    }

    .s2.show .btn-here {
      animation: riseIn 1.1s var(--ease-out) 0.52s forwards;
    }

    .btn-here:hover {
      transform: translateY(-4px) scale(1.018);
      border-color: rgba(34,158,217,0.48);
      background: linear-gradient(180deg,
        rgba(34,158,217,0.30) 0%,
        rgba(34,158,217,0.14) 50%,
        rgba(34,158,217,0.06) 100%);
      box-shadow:
        0  0   0  1px rgba(34,158,217,0.15),
        0  2px  6px rgba(0,0,0,0.34),
        0 10px 30px rgba(7,56,90,0.38),
        0 28px 62px rgba(7,56,90,0.42),
        inset 0 1px 0 rgba(255,255,255,0.14),
        0  0  72px rgba(34,158,217,0.20);
    }

    .btn-here:hover .shimmer {
      transform: translateX(160%);
    }

    .btn-here:active {
      transform: translateY(-1px) scale(1.008);
      transition-duration: 120ms;
    }

    .btn-here:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 3px rgba(34,158,217,0.58),
        0 0 0 6px rgba(34,158,217,0.18),
        0 22px 52px rgba(7,56,90,0.42);
    }

    /* ── tg bottom hint ── */
    .tg-hint {
      font-size: clamp(0.52rem, 0.78vw, 0.62rem);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(34,158,217,0.30);
      opacity: 0;
    }

    .s2.show .tg-hint {
      animation: fadeIn 1s ease 0.78s forwards;
    }

    /* ═══════════════════════════════════════════════════════════
       AMBIENT LIGHT BLOB — follows mouse
    ═══════════════════════════════════════════════════════════ */

    .ambient-blob {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(196,17,31,0.08) 0%,
        transparent 70%);
      pointer-events: none;
      z-index: 1;
      transform: translate(-50%, -50%);
      transition: left 1.4s ease, top 1.4s ease;
      filter: blur(0px);
    }

    /* ═══════════════════════════════════════════════════════════
       KEYFRAMES
    ═══════════════════════════════════════════════════════════ */

    @keyframes haloBreath {
      0%,  100% { opacity: 0.78; transform: scale(1); }
      50%        { opacity: 1.00; transform: scale(1.07) translateY(-8px); }
    }

    @keyframes titleReveal {
      0%   { opacity: 0; transform: translateY(34px) scale(0.972); }
      50%  { opacity: 1; }
      100% { opacity: 1; transform: translateY(0)    scale(1); }
    }

    @keyframes riseIn {
      0%   { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes dotPulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1);   opacity: 0.88; }
      50%       { transform: translate(-50%,-50%) scale(1.6); opacity: 1.00; }
    }

    @keyframes btnReveal {
      0%   { opacity: 0; transform: translateY(22px) scale(0.966); filter: blur(16px); }
      44%  { opacity: 1; }
      78%  { filter: blur(0); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes glowPulse {
      0%   { opacity: 0.00; }
      100% { opacity: 0.22; }
    }

    @keyframes orbReveal {
      0%   { opacity: 0; transform: translateY(38px) scale(0.86); filter: blur(10px); }
      52%  { opacity: 1; }
      100% { opacity: 1; transform: translateY(0)   scale(1);    filter: blur(0);   }
    }

    @keyframes ringPulse {
      0%,  100% { opacity: 0.88; transform: scale(1);    }
      50%        { opacity: 1.00; transform: scale(1.05); }
    }

    @keyframes sceneOut {
      0%   { opacity: 1; transform: scale(1)     translateY(0);   filter: blur(0);  }
      100% { opacity: 0; transform: scale(0.952) translateY(22px); filter: blur(7px); }
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════════════ */

    @media (max-width: 640px) {
      body { cursor: auto; }
      .cursor-dot, .cursor-ring { display: none; }
      .main-title { letter-spacing: 0.04em; }
      .eyebrow    { letter-spacing: 0.34em; }
      .corner-mark { display: none; }
      .side-line   { display: none; }
      .tg-corner   { display: none; }
      .ambient-blob { display: none; }
    }

    /* ═══════════════════════════════════════════════════════════
       REDUCED MOTION
    ═══════════════════════════════════════════════════════════ */

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration:       0.01ms !important;
        animation-iteration-count: 1     !important;
        transition-duration:      0.01ms !important;
      }
      .eyebrow,
      .main-title,
      .sep,
      .side-line,
      .corner-mark,
      .hint {
        opacity: 1;
        transform: none;
      }
      .btn-soficated {
        opacity: 1;
        visibility: visible;
        transform: none;
      }
    }

  </style>
</head>
<body>

    <button class="btn-here" id="btnHere" type="button" aria-label="Open Telegram">

  <!-- ════════════════════════════════════════
       JAVASCRIPT
  ════════════════════════════════════════ -->
  <script>
    'use strict';

    /* ─────────────────────────────
       REDUCED MOTION CHECK
    ───────────────────────────── */
    /* MUSIC */
(function initMusic() {
  const music = document.getElementById('bgMusic');
  if (!music) return;
  music.volume = 0.55;
  function tryPlay() { music.play().catch(function(){}); }
  function onFirst() {
    tryPlay();
    document.removeEventListener('click', onFirst);
    document.removeEventListener('touchstart', onFirst);
  }
  document.addEventListener('click', onFirst, { once: true, passive: true });
  document.addEventListener('touchstart', onFirst, { once: true, passive: true });
  tryPlay();
  window.__music = {
    stop: function() {
      var t = setInterval(function() {
        if (music.volume > 0.05) { music.volume = Math.max(0, music.volume - 0.05); }
        else { music.pause(); clearInterval(t); }
      }, 60);
    }
  };
}());
    const NO_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ─────────────────────────────
       RAIN ENGINE
    ───────────────────────────── */
    (function buildRain() {
      const cv  = document.getElementById('rainCanvas');
      const ctx = cv.getContext('2d');
      let drops   = [];
      let W = 0, H = 0;
      let active  = true;
      let lastTs  = 0;

      function resize() {
        W = cv.width  = window.innerWidth;
        H = cv.height = window.innerHeight;
      }

      function mkDrop(pre) {
        return {
          x:    Math.random() * W,
          y:    pre ? Math.random() * H : -80 - Math.random() * 340,
          len:  24 + Math.random() * 100,
          w:    0.5 + Math.random() * 1.05,
          spd:  300 + Math.random() * 380,
          op:   0.14 + Math.random() * 0.74,
          skew: 3 + Math.random() * 9,
        };
      }

      function seed() {
        const n = W < 768 ? 130 : 220;
        drops = Array.from({ length: n }, () => mkDrop(true));
      }

      function draw(d) {
        const x2 = d.x + d.skew;
        const y2 = d.y + d.len;
        const g  = ctx.createLinearGradient(d.x, d.y, x2, y2);
        g.addColorStop(0,    'rgba(255,55,55,0)');
        g.addColorStop(0.18, `rgba(222,38,48,${d.op * 0.68})`);
        g.addColorStop(0.56, `rgba(198,16,26,${d.op})`);
        g.addColorStop(0.88, `rgba(124, 7,14,${d.op * 0.76})`);
        g.addColorStop(1,    'rgba(50,2,4,0)');

        ctx.save();
        ctx.globalAlpha  = d.op;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle  = g;
        ctx.lineWidth    = d.w;
        ctx.lineCap      = 'round';
        ctx.shadowColor  = 'rgba(196,14,22,0.22)';
        ctx.shadowBlur   = 5;
        ctx.stroke();
        ctx.restore();
      }

      function frame(ts) {
        if (!active) return;
        const dt = Math.min((ts - lastTs) / 1000, 0.055);
        lastTs = ts;
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < drops.length; i++) {
          const d = drops[i];
          d.y += d.spd * dt;
          draw(d);
          if (d.y > H + 32) drops[i] = mkDrop(false);
        }
        requestAnimationFrame(frame);
      }

      if (!NO_MOTION) {
        resize();
        window.addEventListener('resize', () => { resize(); seed(); }, { passive: true });
        seed();
        requestAnimationFrame(frame);
      }

      window.__rain = {
        fade: function () {
          cv.classList.add('fade-out');
          setTimeout(function () { active = false; }, 1800);
        }
      };
    }());

    /* ─────────────────────────────
       PARTICLE ENGINE
    ───────────────────────────── */
    (function buildParticles() {
      const cv  = document.getElementById('particleCanvas');
      const ctx = cv.getContext('2d');
      let pts   = [];
      let W = 0, H = 0;
      let active = true;
      let lastTs = 0;

      function resize() {
        W = cv.width  = window.innerWidth;
        H = cv.height = window.innerHeight;
      }

      function mkPt(pre) {
        return {
          x:    Math.random() * W,
          y:    pre ? Math.random() * H : H + 10,
          r:    0.8 + Math.random() * 1.6,
          spd:  28 + Math.random() * 52,
          dx:   (Math.random() - 0.5) * 18,
          op:   0.12 + Math.random() * 0.64,
          life: 0,
          max:  4 + Math.random() * 8,
        };
      }

      function seed() {
        const n = W < 768 ? 38 : 62;
        pts = Array.from({ length: n }, () => mkPt(true));
      }

      function frame(ts) {
        if (!active) return;
        const dt = Math.min((ts - lastTs) / 1000, 0.055);
        lastTs = ts;
        ctx.clearRect(0, 0, W, H);

        for (let i = 0; i < pts.length; i++) {
          const p = pts[i];
          p.y   -= p.spd * dt;
          p.x   += p.dx  * dt;
          p.life += dt;
          const t = p.life / p.max;
          const a = t < 0.15 ? (t / 0.15) * p.op
                  : t > 0.72 ? ((1 - t) / 0.28) * p.op
                  : p.op;

          ctx.save();
          ctx.globalAlpha = a;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle   = 'rgba(210,40,54,1)';
          ctx.shadowColor = 'rgba(196,17,31,0.7)';
          ctx.shadowBlur  = 9;
          ctx.fill();
          ctx.restore();

          if (p.life >= p.max || p.y < -10) pts[i] = mkPt(false);
        }
        requestAnimationFrame(frame);
      }

      if (!NO_MOTION) {
        resize();
        window.addEventListener('resize', () => { resize(); seed(); }, { passive: true });
        seed();
        requestAnimationFrame(frame);
      }

      window.__particles = {
        fade: function () {
          cv.classList.add('fade-out');
          setTimeout(function () { active = false; }, 1400);
        }
      };
    }());

    /* ─────────────────────────────
       CUSTOM CURSOR
    ───────────────────────────── */
    (function buildCursor() {
      if (NO_MOTION || window.innerWidth < 640) return;
      const dot  = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');
      let mx = -200, my = -200;
      let rx = -200, ry = -200;
      let lastTs = 0;

      window.addEventListener('mousemove', function (e) {
        mx = e.clientX;
        my = e.clientY;
      }, { passive: true });

      const interactives = 'button, a, [role="button"]';

      document.addEventListener('mouseover', function (e) {
        if (e.target.closest(interactives)) {
          dot.classList.add('hovering');
          ring.classList.add('hovering');
        }
      });

      document.addEventListener('mouseout', function (e) {
        if (e.target.closest(interactives)) {
          dot.classList.remove('hovering');
          ring.classList.remove('hovering');
        }
      });

      function frame(ts) {
        const dt = (ts - lastTs) / 1000;
        lastTs = ts;
        const lag = 1 - Math.pow(0.04, dt);
        rx += (mx - rx) * lag;
        ry += (my - ry) * lag;

        dot.style.left  = mx + 'px';
        dot.style.top   = my + 'px';
        ring.style.left = rx + 'px';
        ring.style.top  = ry + 'px';
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }());

    /* ─────────────────────────────
       AMBIENT BLOB — follows mouse
    ───────────────────────────── */
    (function buildBlob() {
      if (NO_MOTION || window.innerWidth < 640) return;
      const blob = document.getElementById('ambientBlob');
      window.addEventListener('mousemove', function (e) {
        blob.style.left = e.clientX + 'px';
        blob.style.top  = e.clientY + 'px';
      }, { passive: true });
    }());

    /* ─────────────────────────────
       TITLE PARALLAX ON MOUSE
    ───────────────────────────── */
    (function buildParallax() {
      if (NO_MOTION || window.innerWidth < 640) return;
      const title = document.getElementById('mainTitle');
      let cx = window.innerWidth  / 2;
      let cy = window.innerHeight / 2;

      window.addEventListener('mousemove', function (e) {
        const dx = (e.clientX - cx) / cx;
        const dy = (e.clientY - cy) / cy;
        title.style.transform = `translate(${dx * 6}px, ${dy * 4}px)`;
      }, { passive: true });
    }());

    /* ─────────────────────────────
       BUTTON REVEAL — 2 s delay
    ───────────────────────────── */
    const btnMain = document.getElementById('btnMain');
    const hint    = document.getElementById('hint');
    const s1      = document.getElementById('s1');
    const s2      = document.getElementById('s2');

    function revealBtn() {
      btnMain.classList.add('show');
      setTimeout(function () {
        hint.classList.add('visible');
      }, 800);
    }

    if (NO_MOTION) {
      revealBtn();
    } else {
      setTimeout(revealBtn, 2000);
    }

    /* ─────────────────────────────
       SCENE SWITCH
    ───────────────────────────── */
    btnMain.addEventListener('click', function onEnter() {
      if (window.__music) window.__music.stop();
      btnMain.removeEventListener('click', onEnter);

      if (window.__rain)      window.__rain.fade();
      if (window.__particles) window.__particles.fade();
      var nc = document.getElementById('noiseCanvas');
      if (nc) { nc.style.opacity = '0'; nc.style.zIndex = '0'; }

      s1.classList.add('out');

      setTimeout(function () {
        s1.style.display = 'none';
        s2.classList.add('show');
      }, 720);
    });

  </script>

<script>
'use strict';

/* ── Ripple on both buttons ── */
(function addRipples() {
  function makeRipple(btn, e) {
    const rect = btn.getBoundingClientRect();
    const x    = e.clientX - rect.left;
    const y    = e.clientY - rect.top;
    const size = Math.max(rect.width, rect.height);
    const rp   = document.createElement('span');
    rp.className = 'ripple';
    rp.style.cssText = `
      width:  ${size}px;
      height: ${size}px;
      left:   ${x - size / 2}px;
      top:    ${y - size / 2}px;
    `;
    btn.appendChild(rp);
    rp.addEventListener('animationend', function () { rp.remove(); });
  }

  ['btnMain', 'btnHere'].forEach(function(id) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.classList.add('ripple-host');
    btn.addEventListener('click', function(e) { makeRipple(btn, e); });
  });
}());

/* ── Idle glow on main button (starts after reveal) ── */
(function idleGlow() {
  const btn = document.getElementById('btnMain');
  if (!btn) return;
  setTimeout(function () {
    btn.classList.add('idle-glow');
    btn.addEventListener('mouseenter', function () {
      btn.classList.remove('idle-glow');
    });
    btn.addEventListener('mouseleave', function () {
      setTimeout(function () { btn.classList.add('idle-glow'); }, 600);
    });
  }, 3200);
}());

/* ── Orb float after s2 shows ── */
(function orbFloat() {
  const s2   = document.getElementById('s2');
  const wrap = s2 ? s2.querySelector('.tg-orb-wrap') : null;
  if (!wrap) return;
  const obs = new MutationObserver(function() {
    if (s2.classList.contains('show')) {
      setTimeout(function () {
        wrap.classList.add('floating');

  const btn   = document.getElementById('btnMain');
  const flash = document.getElementById('clickFlash');
  if (!btn || !flash) return;
  btn.addEventListener('click', function () {
    flash.classList.remove('burst');
    void flash.offsetWidth; /* reflow */
    flash.classList.add('burst');

/* ── Character-by-character title split ──
   Re-builds .main-title letters with staggered delay
   This gives an Apple-style word-reveal on load           */
(function splitTitle() {
  const title = document.getElementById('mainTitle');
  if (!title) return;
  const text = title.textContent.trim();
  title.textContent = '';
  title.style.opacity = '1';
  title.style.transform = 'none';
  title.style.animation  = 'none';

  text.split('').forEach(function(ch, i) {
    const span       = document.createElement('span');
    span.className   = 'char';
    span.textContent = ch === ' ' ? '\u00a0' : ch;
    span.style.animationDelay = (0.06 + i * 0.055) + 's';
    title.appendChild(span);
  });
}());

/* ── Keyboard support — Enter key triggers main button ── */
(function keyboardNav() {
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      const btn = document.getElementById('btnMain');
      if (btn && btn.classList.contains('show')) {
        e.preventDefault();
        btn.click();
      }
    }
  });
}());

/* ── Window resize: recalculate parallax center ── */
(function handleResize() {
  let timer;
  window.addEventListener('resize', function () {
    clearTimeout(timer);
    timer = setTimeout(function () {
      /* nothing needed here — parallax reads window.innerWidth live */
    }, 180);
  }, { passive: true });
}());

(function wrapEyebrow() {

/* ── add wave rings to tg orb ── */
(function addWaveRings() {
  const orb = document.querySelector('.tg-orb');
  if (!orb) return;
  for (let i = 0; i < 3; i++) {

    r.className = 'tg-wave-ring';
    r.setAttribute('aria-hidden', 'true');
    orb.insertBefore(r, orb.firstChild);

/* ── add tg-scan line ── */
(function addTgScan() {
  const s2 = document.getElementById('s2');
  if (!s2) return;

  sc.className = 'tg-scan';
  sc.setAttribute('aria-hidden', 'true');
  s2.appendChild(sc);
}());

/* ── add dots below HERE button ── */
(function addTgDots() {
  const s2 = document.getElementById('s2');
  if (!s2) return;
  const dots = document.createElement('div');
  dots.className = 'tg-dots';
  dots.setAttribute('aria-hidden', 'true');
  [0,1,2].forEach(function(i) {
    const d = document.createElement('div');
    d.className = 'tg-dot' + (i === 1 ? ' active' : '');
    dots.appendChild(d);
  });
  const hint = s2.querySelector('.tg-hint');
  if (hint) hint.after(dots);
  else s2.appendChild(dots);
}());

/* ── add breath line ── */
(function addBreathLine() {
  const s2 = document.getElementById('s2');
  if (!s2) return;
  const bl = document.createElement('div');
  bl.className = 'breath-line';
  bl.setAttribute('aria-hidden', 'true');
  bl.innerHTML = `
    <div class="breath-dash"></div>
    <span class="breath-label">SOFICATED</span>
    <div class="breath-dash"></div>
  `;
  s2.appendChild(bl);
}());

/* ── magnetic button effect on .btn-soficated ── */
(function magneticBtn() {
  const btn = document.getElementById('btnMain');
  if (!btn || window.innerWidth < 640) return;
  const STRENGTH = 0.32;

  btn.addEventListener('mousemove', function (e) {
    const r  = btn.getBoundingClientRect();
    const cx = r.left + r.width  / 2;
    const cy = r.top  + r.height / 2;
    const dx = (e.clientX - cx) * STRENGTH;
    const dy = (e.clientY - cy) * STRENGTH;
    btn.style.transform = `translate(${dx}px, ${dy}px) translateY(-5px) scale(1.024)`;
  });

  btn.addEventListener('mouseleave', function () {
    btn.style.transform = '';
  });
}());

/* ── 3D tilt on tg orb ── */
(function tiltOrb() {
  const wrap = document.querySelector('.tg-orb-wrap');
  const orb  = document.querySelector('.tg-orb');
  if (!wrap || !orb || window.innerWidth < 640) return;

  wrap.addEventListener('mousemove', function (e) {
    const r  = orb.getBoundingClientRect();
    const cx = r.left + r.width  / 2;
    const cy = r.top  + r.height / 2;
    const rx = ((e.clientY - cy) / (r.height / 2)) * -12;
    const ry = ((e.clientX - cx) / (r.width  / 2)) *  12;
    orb.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) scale(1.04)`;
  });

  wrap.addEventListener('mouseleave', function () {
    orb.style.transform = '';
  });
}());

/* ── HERE button click feedback ── */
(function hereClick() {
  const btn = document.getElementById('btnHere');
  if (!btn) return;
  btn.addEventListener('click', function () {
    btn.classList.add('clicked');
    setTimeout(function () { btn.classList.remove('clicked'); }, 500);
  });
}());

/* ── loader element inject ── */
(function loader() {
  const div = document.createElement('div');
  div.id = 'loader';
  div.innerHTML = '<span class="loader-logo">SOFICATED</span>';
  document.body.insertBefore(div, document.body.firstChild);
  div.addEventListener('animationend', function () {
    div.remove();
  });
}());

<div id="live-region" aria-live="polite" aria-atomic="true"></div>

<!-- horizontal rules in s2 -->
<script>
(function addTgHR() {
  const s2 = document.getElementById('s2');
  if (!s2) return;
  ['top','bottom'].forEach(function(pos) {
    const hr = document.createElement('div');
    hr.className = 'tg-hr tg-hr--' + pos;
    hr.setAttribute('aria-hidden','true');
    s2.appendChild(hr);
  });
}());
</script>

<!-- progress ring inject into orb -->
<script>
(function addProgressRing() {
  const orb = document.querySelector('.tg-orb');
  if (!orb) return;
  const ns  = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 100 100');
  svg.classList.add('progress-ring-svg');
  svg.setAttribute('aria-hidden','true');

  const track = document.createElementNS(ns, 'circle');
  track.setAttribute('cx', '50'); track.setAttribute('cy', '50'); track.setAttribute('r', '50');
  track.classList.add('progress-ring-track');

  const fill = document.createElementNS(ns, 'circle');
  fill.setAttribute('cx', '50'); fill.setAttribute('cy', '50'); fill.setAttribute('r', '50');
  fill.classList.add('progress-ring-fill');

  svg.appendChild(track);
  svg.appendChild(fill);
  orb.appendChild(svg);
}());
</script>

<!-- sub-label inject into s1 -->
<script>
(function addSubLabel() {
  const sep = document.querySelector('.s1 .sep');
  if (!sep) return;
  const p = document.createElement('p');
  p.className = 'sub-label';
  p.textContent = 'OFFICIAL CHANNEL';
  sep.parentNode.insertBefore(p, sep);
}());
</script>

<!-- noise canvas animation -->
<script>
'use strict';
(function noiseCanvas() {
  const cv  = document.getElementById('noiseCanvas');
  if (!cv) return;
  const ctx = cv.getContext('2d');
  let W, H;

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }

  function frame() {
    const img  = ctx.createImageData(W, H);
    const data = img.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() * 255 | 0;
      data[i]     = v;
      data[i + 1] = v;
      data[i + 2] = v;
      data[i + 3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    requestAnimationFrame(frame);
  }

  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    resize();
    window.addEventListener('resize', resize, { passive: true });
    requestAnimationFrame(frame);
  }
}());
</script>

<!-- cursor trail -->
<script>
'use strict';
(function cursorTrail() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  if (window.innerWidth < 640) return;

  let last = { x: -999, y: -999 };
  let count = 0;

  window.addEventListener('mousemove', function (e) {
    const dx = e.clientX - last.x;
    const dy = e.clientY - last.y;
    if (dx * dx + dy * dy < 64) return; /* only every ~8px */
    last = { x: e.clientX, y: e.clientY };

    if (++count > 6) count = 0; /* throttle DOM nodes */

    const dot = document.createElement('div');
    dot.className = 'trail-dot';
    dot.style.left = e.clientX + 'px';
    dot.style.top  = e.clientY + 'px';
    document.body.appendChild(dot);
    dot.addEventListener('animationend', function () { dot.remove(); });
  }, { passive: true });
}());
</script>

<!-- flicker on title once, 3 s after load -->
<script>
'use strict';
(function titleFlicker() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  setTimeout(function () {
    const title = document.getElementById('mainTitle');
    if (!title) return;
    title.classList.add('flicker');
    title.addEventListener('animationend', function () {
      title.classList.remove('flicker');
    }, { once: true });
  }, 3800);
}());
</script>

<!-- aria live region updates -->
<script>
'use strict';
(function ariaUpdates() {
  const live = document.getElementById('live-region');
  const btn  = document.getElementById('btnMain');
  if (!live || !btn) return;

  /* announce button after reveal */
  setTimeout(function () {
    live.textContent = 'Enter button available. Press Enter to continue.';
  }, 2200);

  btn.addEventListener('click', function () {
    live.textContent = 'Opening Telegram destination.';
  });
}());
</script>
