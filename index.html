<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOFICATED</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    image-rendering:pixelated;
    image-rendering:crisp-edges;

    -webkit-font-smoothing:none;
}

body{

    overflow:hidden;

    background:#000;

    height:100vh;

    font-family:'Press Start 2P', monospace;

    color:#ff2d2d;
}

/* BACKGROUND */

.bg{

    position:fixed;
    inset:0;

    background:

    linear-gradient(
        rgba(0,0,0,.92),
        rgba(0,0,0,.98)
    ),

    url('https://i.imgur.com/5QFZ6yX.jpeg');

    background-size:cover;
    background-position:center;

    filter:
    brightness(.05)
    contrast(2)
    saturate(.05);

    transform:scale(1.08);
}

/* RED ATMOSPHERE */

.red-fog{

    position:fixed;
    inset:0;

    background:

    radial-gradient(
        circle at center,
        rgba(255,0,0,.12),
        transparent 60%
    ),

    linear-gradient(
        to bottom,
        rgba(80,0,0,.16),
        rgba(0,0,0,.25)
    );

    mix-blend-mode:screen;

    animation:fog 6s ease-in-out infinite;

    pointer-events:none;
}

@keyframes fog{

    0%{
        opacity:.45;
        transform:scale(1);
    }

    50%{
        opacity:.75;
        transform:scale(1.08);
    }

    100%{
        opacity:.45;
        transform:scale(1);
    }
}

/* CRT */

.crt{

    position:fixed;
    inset:0;

    background:

    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.04),
        rgba(255,255,255,.04) 1px,
        transparent 1px,
        transparent 4px
    ),

    repeating-linear-gradient(
        to right,
        rgba(255,0,0,.03),
        rgba(255,0,0,.03) 1px,
        transparent 1px,
        transparent 3px
    );

    opacity:.24;

    pointer-events:none;
}

/* BLOOD STREAMS */

.blood-rain{

    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;
}

.drop{

    position:absolute;

    top:-40%;

    width:3px;

    background:

    linear-gradient(
        to bottom,
        rgba(255,0,0,0),
        rgba(255,0,0,.9),
        rgba(120,0,0,1)
    );

    box-shadow:
    0 0 8px rgba(255,0,0,.4);

    opacity:.9;

    animation:blood linear infinite;
}

.drop::after{

    content:"";

    position:absolute;

    bottom:-10px;
    left:-3px;

    width:10px;
    height:10px;

    background:#850000;

    border-radius:2px;
}

@keyframes blood{

    from{
        transform:translateY(-120vh);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    to{
        transform:translateY(130vh);
        opacity:.9;
    }
}

/* VIGNETTE */

.vignette{

    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at center,
        transparent 35%,
        rgba(0,0,0,.9) 100%
    );

    pointer-events:none;
}

/* SCREENS */

#enter,
#bio,
#main{

    position:absolute;

    inset:0;

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    z-index:10;
}

#bio,
#main{
    display:none;
}

/* DELAYED INTRO */

#enter{

    opacity:0;

    animation:
    showIntro .2s linear forwards;

    animation-delay:2s;
}

@keyframes showIntro{

    to{
        opacity:1;
    }
}

/* ENTER */

.enter{

    display:flex;

    align-items:center;

    gap:18px;

    opacity:0;

    animation:
    reveal 1.2s ease forwards;

    animation-delay:2.1s;

    cursor:pointer;
}

@keyframes reveal{

    from{

        opacity:0;

        transform:
        translateY(20px)
        scale(.9);

        filter:blur(10px);
    }

    60%{

        opacity:1;

        transform:
        translateY(-2px)
        scale(1.02);

        filter:blur(0);
    }

    to{

        opacity:1;

        transform:
        translateY(0)
        scale(1);

        filter:blur(0);
    }
}

.arrow{

    font-size:20px;

    color:#ff2d2d;

    opacity:.75;

    animation:pulse 1s infinite;
}

@keyframes pulse{

    0%{
        transform:translateX(0);
        opacity:.4;
    }

    50%{
        transform:translateX(6px);
        opacity:1;
    }

    100%{
        transform:translateX(0);
        opacity:.4;
    }
}

/* LOGO */

.logo{

    position:relative;

    padding:28px 46px;

    background:#050505;

    border:4px solid #ff2d2d;

    clip-path:polygon(
    8% 0%,
    92% 0%,
    100% 20%,
    100% 80%,
    92% 100%,
    8% 100%,
    0% 80%,
    0% 20%
    );

    font-size:clamp(18px,5vw,44px);

    text-transform:uppercase;

    overflow:hidden;

    text-shadow:
    0 0 10px rgba(255,0,0,.18);

    animation:
    float 4s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-3px);
    }

    100%{
        transform:translateY(0);
    }
}

/* GLITCH */

.logo::before,
.logo::after{

    content:"SOFICATED";

    position:absolute;

    inset:0;

    display:flex;

    align-items:center;
    justify-content:center;

    background:#050505;

    clip-path:polygon(
    8% 0%,
    92% 0%,
    100% 20%,
    100% 80%,
    92% 100%,
    8% 100%,
    0% 80%,
    0% 20%
    );
}

.logo::before{

    color:#ff0000;

    opacity:.7;

    animation:glitchTop 1.6s infinite linear;
}

.logo::after{

    color:#ff6666;

    opacity:.4;

    animation:glitchBottom 1.2s infinite linear;
}

@keyframes glitchTop{

    0%{
        clip-path:inset(0 0 85% 0);
        transform:translate(-2px,-2px);
    }

    20%{
        clip-path:inset(80% 0 5% 0);
        transform:translate(2px,2px);
    }

    40%{
        clip-path:inset(30% 0 40% 0);
        transform:translate(-1px,1px);
    }

    100%{
        clip-path:inset(0 0 85% 0);
        transform:translate(-2px,-2px);
    }
}

@keyframes glitchBottom{

    0%{
        clip-path:inset(85% 0 0 0);
        transform:translate(2px,2px);
    }

    20%{
        clip-path:inset(60% 0 10% 0);
        transform:translate(-2px,-1px);
    }

    40%{
        clip-path:inset(40% 0 40% 0);
        transform:translate(1px,2px);
    }

    100%{
        clip-path:inset(85% 0 0 0);
        transform:translate(2px,2px);
    }
}

/* SECOND */

#typed{

    width:90%;

    max-width:1100px;

    line-height:2.5;

    font-size:14px;
}

/* THIRD */

.telegram-box{

    margin-top:42px;

    opacity:0;
}

.telegram{

    display:inline-flex;

    align-items:center;
    justify-content:center;

    gap:12px;

    padding:18px 30px;

    background:#050505;

    border:3px solid #ff2d2d;

    clip-path:polygon(
    8% 0%,
    92% 0%,
    100% 20%,
    100% 80%,
    92% 100%,
    8% 100%,
    0% 80%,
    0% 20%
    );

    text-decoration:none;

    color:#ff2d2d;

    font-size:10px;
}

.telegram svg{

    width:18px;
    height:18px;

    fill:#ff2d2d;
}

/* WINDOWS */

.fake-windows{

    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;
}

.window{

    position:absolute;

    width:260px;
    height:170px;

    background:#050505;

    border:2px solid #ff2d2d;

    overflow:hidden;

    opacity:0;
}

.window::before{

    content:"";

    position:absolute;

    top:0;
    left:0;
    right:0;

    height:18px;

    background:#ff2d2d;
}

.window::after{

    content:"[] [] []";

    position:absolute;

    top:4px;
    left:8px;

    font-size:8px;

    color:#000;
}

.window img{

    width:100%;
    height:100%;

    object-fit:cover;

    image-rendering:pixelated;

    mix-blend-mode:screen;

    transform:scale(1.12);

    filter:

    grayscale(1)
    contrast(2)
    brightness(.5)
    sepia(1)
    hue-rotate(-45deg)
    saturate(16);

    opacity:.35;
}

/* POPUP */

.popup{
    animation:popup .25s cubic-bezier(.16,.84,.44,1) forwards;
}

@keyframes popup{

    from{

        opacity:0;

        transform:
        scale(.75)
        translateY(20px);

        filter:blur(4px);
    }

    60%{

        opacity:1;

        transform:
        scale(1.03)
        translateY(-2px);

        filter:blur(0);
    }

    to{

        opacity:1;

        transform:
        scale(1)
        translateY(0);

        filter:blur(0);
    }
}

.fade{
    animation:fade .8s ease forwards;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(14px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<script>

window.addEventListener("load",()=>{

const intro =
document.getElementById("introMusic");

intro.volume = 0.7;

intro.play().catch(()=>{});

});

const text =
"osint • privacy tools • network research";

function startSequence(){

const enter = document.getElementById("enter");
const bio = document.getElementById("bio");
const main = document.getElementById("main");

const typed = document.getElementById("typed");

const music = document.getElementById("music");

const intro =
document.getElementById("introMusic");

const tg =
document.querySelector(".telegram-box");

const windows =
document.querySelectorAll(".window");

enter.style.transition=".7s ease";
enter.style.opacity="0";

setTimeout(()=>{

enter.style.display="none";

bio.style.display="flex";

intro.pause();
intro.currentTime = 0;

music.play();

let i = 0;

const typing = setInterval(()=>{

typed.innerHTML += text.charAt(i);

i++;

if(i >= text.length){

clearInterval(typing);

setTimeout(()=>{

bio.style.transition="1s ease";
bio.style.opacity="0";

setTimeout(()=>{

bio.style.display="none";

main.style.display="flex";

main.classList.add("fade");

setTimeout(()=>{

tg.style.transition="1s ease";
tg.style.opacity="1";

windows.forEach((win,index)=>{

setTimeout(()=>{

win.classList.add("popup");

},index * 500);

});

},700);

},900);

},1200);

}

},110);

},650);

}

</script>
