<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spicyfool.xyz</title>

<style>
body {
    margin: 0;
    background: black;
    color: red;
    font-family: monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
}

h1 {
     font-size: 2.2rem;
    text-shadow: 0 0 20px red;
    animation: flicker 1.5s infinite alternate;
}

p {
    color: #ff4444;
    font-size: 1.2rem;
    margin-top: -20px;
}

.cursor {
    display: inline-block;
    width: 10px;
    animation: blink 1s infinite;
}

.scanlines {
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,0,0,0.03),
        rgba(255,0,0,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
}

@keyframes blink {
    50% {
        opacity: 0;
    }
}

@keyframes flicker {
    0% { opacity: 1; }
    100% { opacity: 0.85; }
}
</style>
</head>

<body>

<div class="scanlines"></div>

<div class="container">
    <h1>SPICYFOOL.XYZ<span class="cursor">_</span></h1>
    <p>ACCESS GRANTED</p>
</div>

</body>
</html>
